      {tab==="bank"&&<Card title="银行账 Sổ ngân hàng">
        {(()=>{let bal=0;const bankItems=payments.filter(p=>p.method==="bank").sort((a,b)=>a.date.localeCompare(b.date)).map(p=>{bal+=p.type==="income"?(p.amount||0):-(p.amount||0);return{...p,runBal:bal};}).reverse();
        return <Table columns={[
          {title:"日期 Ngày",key:"date",nowrap:true},
          {title:"内容 Nội dung",key:"counterparty",render:(v,r)=><span><Badge color={r.type==="income"?"#27ae60":"#e74c3c"}>{r.type==="income"?"收Thu":"支Chi"}</Badge> {getCatLabel(r.category)} — {v}</span>},
          {title:"收入 Thu",key:"amount",align:"right",render:(v,r)=>r.type==="income"?<strong style={{color:"#27ae60"}}>{fmtVND(v)}</strong>:""},
          {title:"支出 Chi",key:"amount",align:"right",render:(v,r)=>r.type==="expense"?<strong style={{color:"#e74c3c"}}>{fmtVND(v)}</strong>:""},
          {title:"余额 Còn lại",key:"runBal",align:"right",render:v=><strong style={{color:v>=0?"#1B4332":"#e74c3c"}}>{fmtVND(v)}</strong>},
        ]} data={bankItems} emptyText="暂无银行记录" />;})()}
      </Card>}

      {/* ── Income detail ── */}
      {tab==="income_detail"&&<Card title="收入明细 Chi tiết thu" actions={canEdit?<Btn size="sm" variant="success" onClick={()=>openNew("income")}>+ 登记收款</Btn>:null}>
        <Table columns={[
          {title:"日期",key:"date",nowrap:true},
          {title:"分类",key:"category",render:v=>getCatLabel(v)},
          {title:"客户/来源",key:"counterparty",render:v=><strong>{v||"—"}</strong>},
          {title:"金额",key:"amount",align:"right",render:v=><strong style={{color:"#27ae60"}}>{fmtVND(v)}</strong>},
          {title:"方式",key:"method",render:v=>({cash:"现金",bank:"银行",wechat:"微信",alipay:"支付宝"}[v]||v)},
          {title:"单据号",key:"refNo",render:v=>v||"—"},
          {title:"备注",key:"notes"},
          {title:"操作",key:"id",align:"center",render:(_,row)=>canEdit?<div style={{display:"flex",gap:4,justifyContent:"center"}}>
            <Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();openEdit(row);}}>编辑</Btn>
            <Btn size="sm" variant="danger" onClick={e=>{e.stopPropagation();removeFn(row.id);}}>删</Btn>
          </div>:null},
        ]} data={payments.filter(p=>p.type==="income")} emptyText="暂无收入记录" />
      </Card>}

      {/* ── Expense detail ── */}
      {tab==="expense_detail"&&<Card title="支出明细" actions={canEdit?<Btn size="sm" variant="danger" onClick={()=>openNew("expense")}>+ 登记付款</Btn>:null}>
        <Table columns={[
          {title:"日期",key:"date",nowrap:true},
          {title:"分类",key:"category",render:v=>getCatLabel(v)},
          {title:"收款方",key:"counterparty",render:v=><strong>{v||"—"}</strong>},
          {title:"金额",key:"amount",align:"right",render:v=><strong style={{color:"#e74c3c"}}>{fmtVND(v)}</strong>},
          {title:"方式",key:"method",render:v=>({cash:"现金",bank:"银行",wechat:"微信",alipay:"支付宝"}[v]||v)},
          {title:"单据号",key:"refNo",render:v=>v||"—"},
          {title:"备注",key:"notes"},
          {title:"操作",key:"id",align:"center",render:(_,row)=>canEdit?<div style={{display:"flex",gap:4,justifyContent:"center"}}>
            <Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();openEdit(row);}}>编辑</Btn>
            <Btn size="sm" variant="danger" onClick={e=>{e.stopPropagation();removeFn(row.id);}}>删</Btn>
          </div>:null},
        ]} data={payments.filter(p=>p.type==="expense")} emptyText="暂无支出记录" />
      </Card>}

      {/* ── Orchard settlement ── */}
      {tab==="settle"&&<Card title="果园结算（意向金20%抵扣，多退少补）"><Table columns={[
        {title:"果园",key:"orchardName",render:v=><strong>{v}</strong>},{title:"合同额",key:"estTotalCost",render:v=>fmtVND(v),align:"right"},
        {title:"意向金",key:"depositAmount",render:v=>fmtVND(v),align:"right"},
        {title:"实采量",key:"actualTotalKG",render:v=>v?fmtKG(v):"待采",align:"right"},
        {title:"实际总额",key:"id",render:(_,r)=>r.actualTotalKG?fmtVND(r.actualTotalKG*r.pricePerKG):"—",align:"right"},
        {title:"尾款/退款",key:"id",align:"right",render:(_,r)=>{if(!r.actualTotalKG)return"—";const d=(r.actualTotalKG*r.pricePerKG)-(r.depositAmount||0);return <strong style={{color:d>=0?"#e74c3c":"#27ae60"}}>{d>=0?"补付":"退还"} {fmtVND(Math.abs(d))}</strong>;}},
      ]} data={data.orchards} /></Card>}

      {/* ── Auto calculated from business data ── */}
      {tab==="auto_calc"&&<div>
        <div style={{background:"#FFFDE7",borderRadius:8,padding:"12px 16px",marginBottom:16,fontSize:12,color:"#795548"}}>
          以下数据根据采购、加工、装车等模块自动计算，用于与实际收付款台账核对。差异部分可能是未登记的款项。
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Card title="应收（业务自动计算）"><div style={{fontSize:13,lineHeight:2.2}}>
            {[["加工费 15,000₫/KG",autoRevProcessing],["装车费 3,000,000₫/柜",autoRevLoading]].map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid #f0f0f0",padding:"4px 0"}}><span>{l}</span><strong style={{color:"#27ae60"}}>{fmtVND(v)}</strong></div>)}
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",fontWeight:800,fontSize:15,borderTop:"2px solid #333"}}><span>应收合计</span><span style={{color:"#27ae60"}}>{fmtVND(autoRevProcessing+autoRevLoading)}</span></div>
            <div style={{marginTop:8,fontSize:12,color:totalIncome>=(autoRevProcessing+autoRevLoading)?"#27ae60":"#e74c3c"}}>
              已收: {fmtVND(totalIncome)} | 差额: {fmtVND(totalIncome-(autoRevProcessing+autoRevLoading))}
            </div>
          </div></Card>
          <Card title="应付（业务自动计算）"><div style={{fontSize:13,lineHeight:2.2}}>
            {[["商贩采购",autoCostVendor],["果园直采 6,500₫/KG",autoCostOrchard],["场内加工 1,600₫/KG",autoCostProcess],["人工月薪",autoCostSalary]].map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid #f0f0f0",padding:"4px 0"}}><span>{l}</span><strong style={{color:"#e74c3c"}}>{fmtVND(v)}</strong></div>)}
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",fontWeight:800,fontSize:15,borderTop:"2px solid #333"}}><span>应付合计</span><span style={{color:"#e74c3c"}}>{fmtVND(autoCostVendor+autoCostOrchard+autoCostProcess+autoCostSalary)}</span></div>
            <div style={{marginTop:8,fontSize:12,color:totalExpense>=(autoCostVendor+autoCostOrchard+autoCostProcess+autoCostSalary)?"#27ae60":"#e74c3c"}}>
              已付: {fmtVND(totalExpense)} | 差额: {fmtVND(totalExpense-(autoCostVendor+autoCostOrchard+autoCostProcess+autoCostSalary))}
            </div>
          </div></Card>
        </div>
      </div>}

      {/* ── Payment Form ── */}
      {showForm&&editItem&&(
        <Modal title={editItem.type==="income"?"登记收款":"登记付款"} onClose={()=>setShowForm(false)} width={600}>
          <div style={{background:editItem.type==="income"?"#e8f5e9":"#fce4ec",borderRadius:8,padding:"10px 16px",marginBottom:16,fontSize:13,fontWeight:600,color:editItem.type==="income"?"#1B5E20":"#B71C1C"}}>
            {editItem.type==="income"?"📥 收入登记 — 客户预付款/加工费结算/股东注资/CD果及冷冻产品销售":"📤 支出登记 — 采购付款/果园结算/人工/包材/运输/租金等"}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
            <Input label="日期" type="date" value={editItem.date} onChange={v=>setEditItem({...editItem,date:v})} required />
            <Input label="收支类型" value={editItem.type} onChange={v=>setEditItem({...editItem,type:v,category:""})}
              options={[{value:"income",label:"收入"},{value:"expense",label:"支出"}]} />
            <Input label="分类" value={editItem.category} onChange={v=>setEditItem({...editItem,category:v})} required
              options={editItem.type==="income"?incomeCategories:expenseCategories} />
            <Input label={editItem.type==="income"?"付款方/来源":"收款方"} value={editItem.counterparty}
              onChange={v=>setEditItem({...editItem,counterparty:v})} required placeholder={editItem.type==="income"?"客户名称/股东姓名/买家":"供应商/果农/员工"} />
            <Input label="金额 (VND)" type="number" value={editItem.amount} onChange={v=>setEditItem({...editItem,amount:v})} required suffix="₫" />
            <Input label="支付方式" value={editItem.method} onChange={v=>setEditItem({...editItem,method:v})} options={methodOptions} />
            <Input label="单据/凭证号" value={editItem.refNo} onChange={v=>setEditItem({...editItem,refNo:v})} placeholder="转账单号/收据编号" />
            <Input label="关联单号" value={editItem.relatedId} onChange={v=>setEditItem({...editItem,relatedId:v})} placeholder="关联柜号/采购批次等" />
          </div>
          <Input label="备注" type="textarea" value={editItem.notes} onChange={v=>setEditItem({...editItem,notes:v})} placeholder="补充说明..." />
          {editItem.amount&&<div style={{background:"#f8f9fa",borderRadius:8,padding:12,fontSize:14,textAlign:"center",fontWeight:700,color:editItem.type==="income"?"#27ae60":"#e74c3c"}}>
            {editItem.type==="income"?"收入":"支出"}金额：{fmtVND(parseFloat(editItem.amount)||0)}
          </div>}
          <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}>
            <Btn variant="secondary" onClick={()=>setShowForm(false)}>取消</Btn>
            <Btn variant={editItem.type==="income"?"success":"danger"} onClick={saveFn}>确认{editItem.type==="income"?"收款":"付款"}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════
// Salary Module 工资考勤 Bảng lương & Chấm công
// ═══════════════════════════════════════════════════════
const SalaryModule = ({ data, setData, role }) => {
  const [tab,setTab]=useState("payroll");
  const [showForm,setShowForm]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [selMonth,setSelMonth]=useState(today().slice(0,7));
  const canEdit=ROLES[role]?.level>=2;
  const records=data.salaryRecords||[];

  const daysInMonth=(ym)=>{const [y,m]=ym.split("-").map(Number);return new Date(y,m,0).getDate();};

  const empty={id:"",month:selMonth,staffId:"",staffName:"",dept:"office",baseSalary:"",workDays:"",
    allowResp:"",allowMeal:"",allowPhone:"",allowFuel:"",
    siRate:0,hiRate:0,uiRate:0,
    siEmp:0,hiEmp:0,uiEmp:0,
    bonus:"",deduction:"",notes:""};

  const openNew=()=>{setEditItem({...empty,id:genId(),month:selMonth});setShowForm(true);};
  const openEdit=r=>{setEditItem({...r});setShowForm(true);};

  const calc=(item)=>{
    const n=k=>parseFloat(item[k])||0;
    const dm=daysInMonth(item.month||selMonth);
    const actualSalary=n("baseSalary")/dm*n("workDays");
    const allowances=n("allowResp")+n("allowMeal")+n("allowPhone")+n("allowFuel");
    const gross=actualSalary+allowances+n("bonus");
    const siCompany=n("baseSalary")*n("siRate");
    const hiCompany=n("baseSalary")*n("hiRate");
    const uiCompany=n("baseSalary")*n("uiRate");
    const siEmp=n("baseSalary")*n("siEmp");
    const hiEmp=n("baseSalary")*n("hiEmp");
    const uiEmp=n("baseSalary")*n("uiEmp");
    const totalInsCompany=siCompany+hiCompany+uiCompany;
    const totalInsEmp=siEmp+hiEmp+uiEmp;
    const net=gross-totalInsEmp-n("deduction");
    return {actualSalary,allowances,gross,totalInsCompany,totalInsEmp,net,dm};
  };

  const saveFn=()=>{
    const item={...editItem};
    const c=calc(item);
    if(!item.createdBy)item.createdBy=currentUser?.id;item.lastEditBy=currentUser?.id;
    item.actualSalary=c.actualSalary;item.grossSalary=c.gross;item.netSalary=c.net;
    item.insCompany=c.totalInsCompany;item.insEmployee=c.totalInsEmp;
    const list=[...records];const idx=list.findIndex(r=>r.id===item.id);
    if(idx>=0)list[idx]=item;else list.push(item);
    setData({...data,salaryRecords:list});save("df_sal",list);setShowForm(false);
  };
  const removeFn=id=>{if(!confirm("确认删除？"))return;const list=records.filter(r=>r.id!==id);setData({...data,salaryRecords:list});save("df_sal",list);};

  const monthRecords=records.filter(r=>r.month===selMonth);
  const totalGross=monthRecords.reduce((s,r)=>s+(r.grossSalary||0),0);
  const totalNet=monthRecords.reduce((s,r)=>s+(r.netSalary||0),0);
  const totalInsC=monthRecords.reduce((s,r)=>s+(r.insCompany||0),0);
  const officeRecs=monthRecords.filter(r=>r.dept==="office");
  const workerRecs=monthRecords.filter(r=>r.dept==="worker");

  const months=[...new Set(records.map(r=>r.month))].sort().reverse();
  if(!months.includes(selMonth))months.unshift(selMonth);

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:800,color:"#1B4332"}}>💼 工资管理 Bảng lương</h2>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <Input label="" value={selMonth} onChange={setSelMonth} type="month" style={{marginBottom:0,minWidth:150}} />
          {canEdit&&<Btn onClick={openNew}>+ 添加工资条 Thêm lương</Btn>}
        </div>
      </div>

      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <StatCard label="本月人数 Số NV" value={monthRecords.length} sub={`办公${officeRecs.length} 工人${workerRecs.length}`} />
        <StatCard label="应发总额 Tổng lương" value={fmtVND(totalGross)} color="#2980b9" />

// Profit Module 每柜利润核算 Lợi nhuận theo cont
// ═══════════════════════════════════════════════════════
const ProfitModule = ({ data, role }) => {
  const isAdmin=role==="admin";
  const containers=data.containers||[];

  // Build profit data per container
  const profitData=containers.map(c=>{
    const rev=(c.loadedWeight||0)*15000; // 加工费
    const loadFee=3000000; // 装车费
    const totalRev=rev+loadFee;
    // Costs: try to find linked payment records
    const payments=data.payments||[];
    const linked=payments.filter(p=>p.relatedId&&(p.relatedId===c.containerNo||p.relatedId===c.contSeq));
    const linkedCost=linked.filter(p=>p.type==="expense").reduce((s,p)=>s+(p.amount||0),0);
    // Estimated costs
    const processingCost=(c.loadedWeight||0)*1600; // 场内加工
    const boxCount=c.totalBoxes||0;
    const boxCost=boxCount*29000; // 纸箱成本29000/箱
    const estTotalCost=processingCost+boxCost;
    const profit=totalRev-estTotalCost;
    return {
      ...c, revenue:totalRev, revProcessing:rev, revLoading:loadFee,
      costProcessing:processingCost, costBox:boxCost, estTotalCost,
      linkedCost, profit, profitRate:totalRev>0?profit/totalRev:0,
    };
  });

  const totalRev=profitData.reduce((s,c)=>s+c.revenue,0);
  const totalCost=profitData.reduce((s,c)=>s+c.estTotalCost,0);
  const totalProfit=profitData.reduce((s,c)=>s+c.profit,0);

  return (
    <div>
      <h2 style={{fontSize:20,fontWeight:800,color:"#1B4332",marginBottom:20}}>📈 每柜利润 Lợi nhuận theo cont</h2>

      {!isAdmin&&<div style={{background:"#FFF3E0",borderRadius:8,padding:"10px 16px",marginBottom:16,fontSize:12,color:"#E65100"}}>
        🔒 利润详情仅管理员可见 Chi tiết LN chỉ dành cho quản trị viên
      </div>}

      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <StatCard label="总柜数 Số cont" value={containers.length} />
        {isAdmin&&<StatCard label="总营收 Doanh thu" value={fmtVND(totalRev)} color="#27ae60" />}
        {isAdmin&&<StatCard label="总成本(估) Chi phí" value={fmtVND(totalCost)} color="#e74c3c" />}
        {isAdmin&&<StatCard label="总利润 Lợi nhuận" value={fmtVND(totalProfit)} color={totalProfit>=0?"#1B4332":"#e74c3c"} />}
        {isAdmin&&<StatCard label="平均利润率" value={totalRev>0?(totalProfit/totalRev*100).toFixed(1)+"%":"—"} color="#8e44ad" />}
      </div>

      <Card>
        <div style={{background:"#f8f9fa",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:11,color:"#666"}}>
          成本估算: 加工费1,600₫/KG + 纸箱29,000₫/箱。实际成本请在财务模块关联柜号记录。
        </div>
        <Table columns={[
          {title:"序号",key:"contSeq",render:v=><strong>{v||"—"}</strong>},
          {title:"柜号 Số cont",key:"containerNo",render:v=><strong style={{fontFamily:"monospace"}}>{v||"—"}</strong>},
          {title:"品牌",key:"brand"},
          {title:"件数",key:"totalBoxes",align:"right"},
          {title:"重量KG",key:"loadedWeight",align:"right",render:v=>v?v.toLocaleString():"—"},
          ...(isAdmin?[
            {title:"营收 DT",key:"revenue",align:"right",render:v=><strong style={{color:"#27ae60"}}>{fmtVND(v)}</strong>},
            {title:"加工费成本",key:"costProcessing",align:"right",render:v=>fmtVND(v)},
            {title:"纸箱成本",key:"costBox",align:"right",render:v=>fmtVND(v)},
            {title:"估算成本 CP",key:"estTotalCost",align:"right",render:v=>fmtVND(v)},
            {title:"利润 LN",key:"profit",align:"right",render:v=><strong style={{color:v>=0?"#27ae60":"#e74c3c"}}>{fmtVND(v)}</strong>},
            {title:"利润率",key:"profitRate",align:"right",render:v=><span style={{color:v>=0?"#27ae60":"#e74c3c"}}>{(v*100).toFixed(1)}%</span>},
          ]:[]),
        ]} data={profitData} emptyText="暂无装车数据" />
        {isAdmin&&profitData.length>0&&<div style={{display:"flex",justifyContent:"flex-end",gap:24,marginTop:12,fontSize:14,fontWeight:800,paddingTop:8,borderTop:"2px solid #333"}}>
          <span>营收: <span style={{color:"#27ae60"}}>{fmtVND(totalRev)}</span></span>
          <span>成本: <span style={{color:"#e74c3c"}}>{fmtVND(totalCost)}</span></span>
          <span>利润: <span style={{color:totalProfit>=0?"#27ae60":"#e74c3c"}}>{fmtVND(totalProfit)}</span></span>
        </div>}
      </Card>
    </div>
  );
};

// Nitrogen Freezing Module 液氮冷冻 Cấp đông Nito
// ═══════════════════════════════════════════════════════
const NitrogenModule = ({ data, setData, role, currentUser }) => {
  const [showForm,setShowForm]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const canEdit=ROLES[role]?.level>=1;
  const records=data.nitrogenRecords||[];

  const empty={id:"",date:today(),clientCode:"",sourceType:"vendor",supplierName:"",
    totalKG:"",abcKG:"",kemKG:"",haoKG:"",orchardKG:"",
    cutPrice:"6000",cutTotal:"",
    knockPrice:"",knockKG:"",knockTotal:"",
    notes:""};

  const openNew=()=>{setEditItem({...empty,id:genId()});setShowForm(true);};
  const openEdit=r=>{setEditItem({...r});setShowForm(true);};

  const calcN=(item)=>{
    const n=k=>parseFloat(item[k])||0;
    const cutTotal=n("abcKG")*n("cutPrice");
    const knockTotal=n("knockKG")*n("knockPrice");
    return {cutTotal,knockTotal,totalLabor:cutTotal+knockTotal};
  };

  const saveFn=()=>{
    const item={...editItem};
    const c=calcN(item);
    if(!item.createdBy)item.createdBy=currentUser?.id;item.lastEditBy=currentUser?.id;
    item.cutTotal=c.cutTotal;item.knockTotal=c.knockTotal;item.totalLabor=c.totalLabor;
    item.totalKG=parseFloat(item.totalKG)||0;
    const list=[...records];const idx=list.findIndex(r=>r.id===item.id);
    if(idx>=0)list[idx]=item;else list.push(item);
    setData({...data,nitrogenRecords:list});save("df_nito",list);setShowForm(false);
  };
  const removeFn=id=>{if(!confirm("确认删除？"))return;const list=records.filter(r=>r.id!==id);setData({...data,nitrogenRecords:list});save("df_nito",list);};

  const totalAllKG=records.reduce((s,r)=>s+(r.totalKG||0),0);
  const totalCut=records.reduce((s,r)=>s+(r.cutTotal||0),0);
  const totalKnock=records.reduce((s,r)=>s+(r.knockTotal||0),0);

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:800,color:"#1B4332"}}>🧊 液氮冷冻 Cấp đông Nito</h2>
        {canEdit&&<Btn onClick={openNew}>+ 新增记录 Thêm</Btn>}
      </div>

      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <StatCard label="总采购量 Tổng KG" value={totalAllKG.toLocaleString()+" kg"} sub={`${records.length} 批次`} />
        <StatCard label="砍果工资 Công cắt" value={fmtVND(totalCut)} color="#e67e22" sub="6,000₫/kg" />
        <StatCard label="敲果工资 Công gõ" value={fmtVND(totalKnock)} color="#8e44ad" />
        <StatCard label="人工合计 Tổng công" value={fmtVND(totalCut+totalKnock)} color="#e74c3c" />
      </div>

      <Card>
        <Table columns={[
          {title:"日期 Ngày",key:"date",nowrap:true},
          {title:"客户 Khách",key:"clientCode",render:v=><strong>{v||"—"}</strong>},
          {title:"来源",key:"sourceType",render:v=><Badge color={v==="vendor"?"#3498db":"#27ae60"}>{v==="vendor"?"买手Lái":"果园Vườn"}</Badge>},
          {title:"总量KG",key:"totalKG",align:"right",render:v=>v?parseFloat(v).toLocaleString():"—"},
          {title:"ABC(KG)",key:"abcKG",align:"right",render:v=>v?parseFloat(v).toLocaleString():"—"},
          {title:"砍果工资",key:"cutTotal",align:"right",render:v=>v?fmtVND(v):"—"},
          {title:"敲果KG",key:"knockKG",align:"right",render:v=>v?parseFloat(v).toLocaleString():"—"},
          {title:"敲果工资",key:"knockTotal",align:"right",render:v=>v?fmtVND(v):"—"},
          {title:"人工合计",key:"totalLabor",align:"right",render:v=>v?<strong style={{color:"#e74c3c"}}>{fmtVND(v)}</strong>:"—"},
          {title:"操作",key:"id",align:"center",render:(_,row)=>canEdit?<div style={{display:"flex",gap:4,justifyContent:"center"}}><Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();openEdit(row);}}>编辑</Btn><Btn size="sm" variant="danger" onClick={e=>{e.stopPropagation();removeFn(row.id);}}>删</Btn></div>:null},
        ]} data={records} emptyText="暂无液氮冷冻记录" />
      </Card>

      {showForm&&editItem&&(
        <Modal title="液氮冷冻记录 Phiếu cấp đông Nito" onClose={()=>setShowForm(false)} width={680}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 16px"}}>
            <Input label="日期 Ngày" type="date" value={editItem.date} onChange={v=>setEditItem({...editItem,date:v})} required />
            <Input label="客户号 Mã khách" value={editItem.clientCode} onChange={v=>setEditItem({...editItem,clientCode:v})} placeholder="Xe cậu / CONGTY / Tống" />
            <Input label="来源 Nguồn" value={editItem.sourceType} onChange={v=>setEditItem({...editItem,sourceType:v})}
              options={[{value:"vendor",label:"买手 Lái"},{value:"orchard",label:"果园 Vườn"}]} />
          </div>
          <div style={{fontSize:13,fontWeight:700,color:"#1B4332",marginBottom:8,marginTop:8}}>重量明细 Chi tiết KG</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"0 12px"}}>
            <Input label="采购总量 SL mua" type="number" value={editItem.totalKG} onChange={v=>setEditItem({...editItem,totalKG:v})} suffix="kg" />
            <Input label="ABC重量 SL tính công" type="number" value={editItem.abcKG} onChange={v=>setEditItem({...editItem,abcKG:v})} suffix="kg" />
            <Input label="烂果Kem" type="number" value={editItem.kemKG} onChange={v=>setEditItem({...editItem,kemKG:v})} suffix="kg" />
            <Input label="损耗Hao" type="number" value={editItem.haoKG} onChange={v=>setEditItem({...editItem,haoKG:v})} suffix="kg" />
          </div>
          <div style={{fontSize:13,fontWeight:700,color:"#1B4332",marginBottom:8,marginTop:8}}>人工费 Công lao động</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 16px"}}>
            <Input label="砍果单价 Giá cắt (₫/kg)" type="number" value={editItem.cutPrice} onChange={v=>setEditItem({...editItem,cutPrice:v})} suffix="₫/kg" />
            <Input label="敲果重量 SL gõ (kg)" type="number" value={editItem.knockKG} onChange={v=>setEditItem({...editItem,knockKG:v})} suffix="kg" />
            <Input label="敲果单价 Giá gõ (₫/kg)" type="number" value={editItem.knockPrice} onChange={v=>setEditItem({...editItem,knockPrice:v})} suffix="₫/kg" />
          </div>

          {(()=>{const c=calcN(editItem);return(c.cutTotal>0||c.knockTotal>0)?(
            <div style={{background:"#E3F2FD",borderRadius:8,padding:14,marginTop:8,fontSize:13}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <div>砍果工资: <strong>{fmtVND(c.cutTotal)}</strong></div>
                <div>敲果工资: <strong>{fmtVND(c.knockTotal)}</strong></div>
                <div>人工合计: <strong style={{color:"#e74c3c",fontSize:16}}>{fmtVND(c.totalLabor)}</strong></div>
              </div>
            </div>
          ):null;})()}

          <Input label="备注 Ghi chú" type="textarea" value={editItem.notes} onChange={v=>setEditItem({...editItem,notes:v})} style={{marginTop:8}} placeholder="ABC数量/损耗明细/果园名等" />
          <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}><Btn variant="secondary" onClick={()=>setShowForm(false)}>取消</Btn><Btn onClick={saveFn}>保存</Btn></div>
        </Modal>
      )}
    </div>
  );
};

// Staff, Inventory, Asset, Settings Modules

const SimpleListModule = ({ title, emoji, dataKey, data, setData, role, fields, minLevel=1 }) => {
  const [showForm,setShowForm]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const canEdit=ROLES[role]?.level>=minLevel;
  const items=data[dataKey]||[];
  const emptyItem=Object.fromEntries(fields.map(f=>[f.key,f.default||""]));
  const openNew=()=>{setEditItem({...emptyItem,id:genId()});setShowForm(true);};
  const openEdit=item=>{setEditItem({...item});setShowForm(true);};
  const saveFn=()=>{
    const item={...editItem};fields.forEach(f=>{if(f.type==="number")item[f.key]=parseFloat(item[f.key])||0;});
    const list=[...items];const idx=list.findIndex(i=>i.id===item.id);if(idx>=0)list[idx]=item;else list.push(item);
    setData({...data,[dataKey]:list});save(SK[dataKey],list);setShowForm(false);
  };
  const removeFn=id=>{if(!confirm("确认删除？"))return;const list=items.filter(i=>i.id!==id);setData({...data,[dataKey]:list});save(SK[dataKey],list);};
  const columns=fields.filter(f=>f.showInTable!==false).map(f=>({
    title:f.label,key:f.key,align:f.align,nowrap:f.nowrap,
    render:f.render||(f.type==="number"&&f.currency?v=>fmtVND(v):f.type==="number"&&f.unit?v=>v?v+" "+f.unit:"—":undefined),
  }));
  columns.push({title:"操作",key:"id",align:"center",render:(_,row)=>canEdit?<div style={{display:"flex",gap:4,justifyContent:"center"}}><Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();openEdit(row);}}>编辑</Btn><Btn size="sm" variant="danger" onClick={e=>{e.stopPropagation();removeFn(row.id);}}>删</Btn></div>:null});
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:800,color:"#1B4332"}}>{emoji} {title}</h2>
        {canEdit&&<Btn onClick={openNew}>+ 新增</Btn>}
      </div>
      <Card><Table columns={columns} data={items} /></Card>
      {showForm&&editItem&&(
        <Modal title={title} onClose={()=>setShowForm(false)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
            {fields.map(f=><Input key={f.key} label={f.label} type={f.type==="number"?"number":f.type||"text"} value={editItem[f.key]||""} onChange={v=>setEditItem({...editItem,[f.key]:v})} options={f.options} suffix={f.suffix} placeholder={f.placeholder} />)}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}><Btn variant="secondary" onClick={()=>setShowForm(false)}>取消</Btn><Btn onClick={saveFn}>保存</Btn></div>
        </Modal>
      )}
    </div>
  );
};

function App() {
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [sideOpen,setSideOpen]=useState(true);
  const [data,setData]=useState({
    users:load(SK.users,DEFAULT_USERS),purchases:load(SK.purchases,[]),orchards:load(SK.orchards,[]),
    batches:load(SK.batches,[]),containers:load(SK.containers,[]),staff:load(SK.staff,[]),
    chemicals:load(SK.chemicals,[]),assets:load(SK.assets,[]),packaging:load(SK.packaging,[]),
    payments:load(SK.payments,[]),
    salaryRecords:load(SK.salaryRecords,[]),
    nitrogenRecords:load(SK.nitrogenRecords,[]),
    loginLogs:load(SK.loginLogs,[]),
  });
  useEffect(()=>{const s=load(SK.session,null);if(s)setUser(s);},[]);
  useEffect(()=>{if(!data.users||data.users.length===0){setData(d=>({...d,users:DEFAULT_USERS}));save(SK.users,DEFAULT_USERS);}},[]);
  const login=u=>{
    setUser(u);save(SK.session,u);
    // Record login log
    const logEntry={id:genId(),userId:u.id,username:u.username,name:u.name,role:u.role,time:new Date().toLocaleString("zh-CN"),timestamp:Date.now()};
    const logs=[logEntry,...(data.loginLogs||[])].slice(0,500); // keep last 500
    setData(d=>({...d,loginLogs:logs}));save(SK.loginLogs,logs);
  };
  const logout=()=>{setUser(null);save(SK.session,null);setPage("dashboard");};

  if(!user) return <LoginScreen onLogin={login} users={data.users||DEFAULT_USERS} />;
  const lv=ROLES[user.role]?.level??0;
  const visNav=NAV.filter(n=>lv>=n.lv);
  const props={data,setData,role:user.role,currentUser:user};

  // ── Global Inventory Alert System ──
  const [dismissedAlerts,setDismissedAlerts]=useState({});
  const inventoryAlerts=useMemo(()=>{
    const alerts=[];
    // Check packaging
    (data.packaging||[]).forEach(p=>{
      if(p.status==="paused") return; // paused items skip alerts
      const stock=parseFloat(p.stock)||0;
      const warn=parseFloat(p.warnStock)||6000;
      const crit=parseFloat(p.critStock)||4000;
      if(stock<=crit) alerts.push({id:`pkg-crit-${p.id}`,level:"critical",icon:"⛔",
        msg:`${p.name}${p.brand?" ("+p.brand+")":""}`,
        detail:`库存 ${stock.toLocaleString()} ${p.unit||"件"} 已低于紧急线 ${crit.toLocaleString()}！Tồn kho dưới mức khẩn cấp!`,
        itemId:p.id, dataKey:"packaging"});
      else if(stock<=warn) alerts.push({id:`pkg-warn-${p.id}`,level:"warning",icon:"⚠️",
        msg:`${p.name}${p.brand?" ("+p.brand+")":""}`,
        detail:`库存 ${stock.toLocaleString()} ${p.unit||"件"} 低于预警线 ${warn.toLocaleString()} Tồn kho thấp`,
        itemId:p.id, dataKey:"packaging"});
    });
    // Check chemicals
    (data.chemicals||[]).forEach(c=>{
      if(c.status==="paused") return;
      const stock=parseFloat(c.stock)||0;
      const warn=parseFloat(c.warnStock)||20;
      const crit=parseFloat(c.critStock)||10;
      if(stock<=crit) alerts.push({id:`chem-crit-${c.id}`,level:"critical",icon:"⛔",
        msg:`药水 ${c.name}`,detail:`库存 ${stock} ${c.unit||"袋"} 低于紧急线！Khẩn cấp!`,
        itemId:c.id, dataKey:"chemicals"});
      else if(stock<=warn) alerts.push({id:`chem-warn-${c.id}`,level:"warning",icon:"⚠️",
        msg:`药水 ${c.name}`,detail:`库存 ${stock} ${c.unit||"袋"} 低于预警线 Tồn kho thấp`,
        itemId:c.id, dataKey:"chemicals"});
    });
    return alerts;
  },[data.packaging,data.chemicals]);

  const activeAlerts=inventoryAlerts.filter(a=>!dismissedAlerts[a.id]);
  const criticalAlerts=activeAlerts.filter(a=>a.level==="critical");

  // Pause a brand/item (set status to paused, auto-dismisses alert)
  const pauseItem=(alert)=>{
    const key=alert.dataKey;
    const list=[...(data[key]||[])];
    const idx=list.findIndex(i=>i.id===alert.itemId);
    if(idx>=0){list[idx]={...list[idx],status:"paused"};setData({...data,[key]:list});save(SK[key],list);}
  };

  const renderPage=()=>{
    switch(page){
      case "dashboard": return <DashboardModule {...props} />;
      case "purchase": return <PurchaseModule {...props} />;
      case "orchard": return <OrchardModule {...props} />;
      case "process": return <ProcessModule {...props} />;
      case "container": return <ContainerModule {...props} />;
      case "finance": return <FinanceModule {...props} />;
      case "salary": return <SalaryModule {...props} />;
      case "profit": return <ProfitModule {...props} />;
      case "nitrogen": return <NitrogenModule {...props} />;
      case "staff": return <SimpleListModule title="人员管理 Quản lý nhân sự" emoji="👥" dataKey="staff" fields={staffFields} minLevel={2} {...props} />;
      case "packaging": return <SimpleListModule title="包材管理 Quản lý bao bì" emoji="📦" dataKey="packaging" fields={pkgFields} {...props} />;
      case "chemicals": return <SimpleListModule title="药剂管理 Quản lý hóa chất" emoji="🧪" dataKey="chemicals" fields={chemFields} {...props} />;
      case "assets": return <SimpleListModule title="固定资产 Quản lý tài sản" emoji="🏗️" dataKey="assets" fields={assetFields} minLevel={2} {...props} />;
      case "settings": return <SettingsModule {...props} />;
      default: return <DashboardModule {...props} />;
    }
  };

  return (
    <div style={{display:"flex",minHeight:"100vh",fontFamily:"'Noto Sans SC','PingFang SC',-apple-system,sans-serif",background:"#f4f5f7",color:"#333"}}>
      <div style={{width:sideOpen?220:60,minHeight:"100vh",background:"linear-gradient(180deg,#1B4332 0%,#2D6A4F 100%)",transition:"width .25s",overflow:"hidden",flexShrink:0,display:"flex",flexDirection:"column"}}>
        <div style={{padding:sideOpen?"20px 18px":"20px 12px",borderBottom:"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setSideOpen(!sideOpen)}>
          <span style={{fontSize:28}}>🥭</span>
          {sideOpen&&<div><div style={{color:"#fff",fontSize:14,fontWeight:800,lineHeight:1.2}}>宁晨公司</div><div style={{color:"rgba(255,255,255,0.6)",fontSize:10,fontWeight:600}}>NINH THAN CTY</div></div>}
        </div>
        <nav style={{flex:1,padding:"12px 8px"}}>
          {visNav.map(item=>{const isA=page===item.key;return(
            <button key={item.key} onClick={()=>setPage(item.key)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:sideOpen?"10px 12px":"10px 14px",background:isA?"rgba(255,255,255,0.15)":"transparent",border:"none",borderRadius:8,cursor:"pointer",color:isA?"#fff":"rgba(255,255,255,0.65)",fontSize:13,fontWeight:isA?700:500,transition:"all .15s",marginBottom:2,textAlign:"left"}}
              onMouseEnter={e=>!isA&&(e.currentTarget.style.background="rgba(255,255,255,0.08)")} onMouseLeave={e=>!isA&&(e.currentTarget.style.background="transparent")}>
              <span style={{fontSize:16}}>{item.emoji}</span>{sideOpen&&<span>{item.label}</span>}
            </button>
          );})}
        </nav>
        <div style={{padding:"12px 8px",borderTop:"1px solid rgba(255,255,255,0.1)"}}>
          <button onClick={logout} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",background:"rgba(255,255,255,0.05)",border:"none",borderRadius:8,cursor:"pointer",color:"rgba(255,255,255,0.6)",fontSize:12,textAlign:"left"}}>
            🚪{sideOpen&&<span>退出登录 Đăng xuất</span>}
          </button>
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <header style={{background:"#fff",padding:"12px 24px",borderBottom:"1px solid #e9ecef",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:11,color:"#888"}}>{new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}</div>
          <div style={{display:"flex",alignItems:"center",gap:12}}><Badge color={ROLES[user.role]?.color}>{ROLES[user.role]?.label}</Badge><span style={{fontSize:13,fontWeight:600}}>{user.name}</span></div>
        </header>
        <main style={{flex:1,padding:24,overflowY:"auto"}}>
          {/* ── Critical Alert Modal (blocks until handled) ── */}
          {criticalAlerts.length>0&&<div style={{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{background:"#fff",borderRadius:16,padding:"32px",maxWidth:520,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",border:"3px solid #e74c3c"}}>
              <div style={{textAlign:"center",marginBottom:20}}>
                <div style={{fontSize:48,marginBottom:8}}>🚨</div>
                <h2 style={{margin:0,fontSize:20,fontWeight:800,color:"#e74c3c"}}>紧急库存警告 CẢNH BÁO KHẨN CẤP</h2>
                <p style={{fontSize:12,color:"#888",marginTop:4}}>以下物资库存严重不足，请立即处理！</p>
              </div>
              {criticalAlerts.map(a=>(
                <div key={a.id} style={{background:"#FDE8E8",borderRadius:10,padding:"12px 16px",marginBottom:10,border:"1px solid #f5c6cb"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,color:"#c0392b"}}>{a.icon} {a.msg}</div>
                      <div style={{fontSize:12,color:"#888",marginTop:2}}>{a.detail}</div>
                    </div>
                    <div style={{display:"flex",gap:6,flexShrink:0,marginLeft:8}}>
                      <Btn size="sm" variant="danger" onClick={()=>pauseItem(a)}>暂停该品牌</Btn>
                      <Btn size="sm" variant="secondary" onClick={()=>setDismissedAlerts(d=>({...d,[a.id]:true}))}>已知悉</Btn>
                    </div>
                  </div>
                </div>
              ))}
              <div style={{textAlign:"center",marginTop:16,fontSize:11,color:"#999"}}>
                点击"已知悉"临时关闭（下次登录仍会提醒）| 点击"暂停该品牌"永久解除预警
              </div>
            </div>
          </div>}

          {/* ── Warning Banner (non-blocking) ── */}
          {activeAlerts.filter(a=>a.level==="warning").length>0&&<div style={{background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:10,padding:"12px 16px",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontWeight:700,fontSize:13,color:"#F57F17"}}>⚠️ 库存预警 Cảnh báo tồn kho ({activeAlerts.filter(a=>a.level==="warning").length})</span>
            </div>
            {activeAlerts.filter(a=>a.level==="warning").map(a=>(
              <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #FFF0B3",fontSize:12}}>
                <span><strong>{a.msg}</strong> — {a.detail}</span>
                <div style={{display:"flex",gap:4,flexShrink:0}}>
                  <Btn size="sm" variant="ghost" onClick={()=>pauseItem(a)} style={{fontSize:11}}>暂停</Btn>
                  <Btn size="sm" variant="ghost" onClick={()=>setDismissedAlerts(d=>({...d,[a.id]:true}))} style={{fontSize:11}}>忽略</Btn>
                </div>
              </div>
            ))}
          </div>}

          {renderPage()}
        </main>
      </div>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800;900&display=swap');*{box-sizing:border-box;}body{margin:0;}::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}input:focus,select:focus,textarea:focus{border-color:#1B4332!important;box-shadow:0 0 0 3px rgba(27,67,50,0.1);}`}</style>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script></body></html>
