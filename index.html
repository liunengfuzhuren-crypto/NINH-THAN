<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宁晨公司 NINH THAN CTY — 榴莲加工厂管理系统</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥭</text></svg>">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif; }
  #root { min-height: 100vh; }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 40%, #40916C 100%); color: #fff; font-family: sans-serif; }
  #loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root">
  <div id="loading">
    <div class="spinner"></div>
    <div style="font-size:36px;margin-bottom:12px;">🥭</div>
    <div style="font-size:18px;font-weight:700;">宁晨公司 NINH THAN CTY</div>
    <div style="font-size:12px;opacity:0.7;margin-top:6px;">系统加载中 Đang tải hệ thống...</div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const fmtVND = (v) => v == null ? "—" : new Intl.NumberFormat("vi-VN").format(Math.round(v)) + " ₫";
const fmtKG = (v) => v != null ? v.toFixed(1) + " kg" : "—";
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const today = () => new Date().toISOString().slice(0, 10);
const todayVN = () => { const d = new Date(); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; };

const ROLES = {
  admin: { label: "管理员", level: 3, color: "#c0392b" },
  manager: { label: "经理", level: 2, color: "#e67e22" },
  operator: { label: "操作员", level: 1, color: "#2980b9" },
  viewer: { label: "查看员", level: 0, color: "#7f8c8d" },
};
const GRADE_COLORS = { A: "#27ae60", B: "#2980b9", C: "#f39c12", D: "#e74c3c" };
// Factory brands
const BRANDS = [
  {value:"Dole",label:"都乐 Dole"},
  {value:"Dachangdao",label:"戴场岛 Đảo"},
  {value:"Maojiaoya",label:"猫脚丫 Mèo"},
  {value:"Guangyuan",label:"广源 Quảng Nguyên"},
  {value:"Huasheng",label:"华盛 Huasheng"},
  {value:"Chuhuafeng",label:"楚华丰 Chuhuafeng"},
  {value:"other",label:"其他 Khác"},
];
const DEFAULT_USERS = [
  { id: "a1", username: "admin", password: "admin123", name: "系统管理员", role: "admin", active: true },
  { id: "m1", username: "manager", password: "mgr123", name: "工厂经理", role: "manager", active: true },
  { id: "o1", username: "operator", password: "op123", name: "操作员A", role: "operator", active: true },
];

const SK = { users:"df_u", purchases:"df_p", orchards:"df_o", batches:"df_b", containers:"df_c", staff:"df_s", chemicals:"df_ch", assets:"df_as", packaging:"df_pk", payments:"df_pay", salaryRecords:"df_sal", nitrogenRecords:"df_nito", loginLogs:"df_logs", session:"df_ss" };
const load = (k, fb=[]) => { try { const d = localStorage.getItem(k); return d ? JSON.parse(d) : fb; } catch { return fb; } };
const save = (k, d) => { try { localStorage.setItem(k, JSON.stringify(d)); } catch {} };
// Ownership check: admin can edit all; others only their own
const canUserEdit = (role, userId, record) => {
  if(ROLES[role]?.level >= 3) return true; // admin edits all
  if(!record?.createdBy) return true; // legacy records without owner
  return record.createdBy === userId;
};

// ── UI Components ──
const Badge = ({ children, color = "#6c757d" }) => (
  <span style={{ display:"inline-block", padding:"2px 10px", borderRadius:20, fontSize:11, fontWeight:600, color:"#fff", background:color, letterSpacing:0.3 }}>{children}</span>
);
const Btn = ({ children, onClick, variant="primary", size="md", disabled, style={}, icon }) => {
  const cs = { primary:{bg:"#1B4332",h:"#2D6A4F",t:"#fff"}, secondary:{bg:"#e9ecef",h:"#dee2e6",t:"#333"}, danger:{bg:"#c0392b",h:"#e74c3c",t:"#fff"}, success:{bg:"#27ae60",h:"#2ecc71",t:"#fff"}, ghost:{bg:"transparent",h:"rgba(0,0,0,0.05)",t:"#555"} };
  const c = cs[variant]||cs.primary;
  const pd = size==="sm"?"5px 12px":size==="lg"?"12px 28px":"8px 20px";
  const fs = size==="sm"?12:size==="lg"?15:13;
  return <button onClick={onClick} disabled={disabled} style={{ display:"inline-flex",alignItems:"center",gap:6, padding:pd,fontSize:fs,fontWeight:600,border:"none",borderRadius:8,cursor:disabled?"not-allowed":"pointer", background:disabled?"#ccc":c.bg,color:disabled?"#888":c.t,transition:"all .15s",opacity:disabled?0.6:1,...style }} onMouseEnter={e=>!disabled&&(e.target.style.background=c.h)} onMouseLeave={e=>!disabled&&(e.target.style.background=c.bg)}>{icon&&<span style={{display:"flex"}}>{icon}</span>}{children}</button>;
};
const Input = ({ label, value, onChange, type="text", placeholder, required, disabled, style={}, options, suffix }) => (
  <label style={{ display:"block", marginBottom:14, ...style }}>
    {label && <span style={{ display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:4 }}>{label}{required&&<span style={{color:"#e74c3c"}}> *</span>}</span>}
    <div style={{position:"relative"}}>
      {options ? <select value={value} onChange={e=>onChange(e.target.value)} disabled={disabled} style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d5d8dc",borderRadius:8,fontSize:13,background:disabled?"#f5f5f5":"#fff",appearance:"none",cursor:"pointer",outline:"none",boxSizing:"border-box"}}><option value="">请选择...</option>{options.map(o=><option key={o.value??o} value={o.value??o}>{o.label??o}</option>)}</select>
      : type==="textarea" ? <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled} rows={3} style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d5d8dc",borderRadius:8,fontSize:13,resize:"vertical",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}} />
      : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} required={required} disabled={disabled} style={{width:"100%",padding:"9px 12px",border:"1.5px solid #d5d8dc",borderRadius:8,fontSize:13,background:disabled?"#f5f5f5":"#fff",outline:"none",boxSizing:"border-box"}} />}
      {suffix&&<span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#999"}}>{suffix}</span>}
    </div>
  </label>
);
const Card = ({ title, children, actions, style={} }) => (
  <div style={{ background:"#fff",borderRadius:12,padding:"20px 24px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:"1px solid #eef0f2",marginBottom:16,...style }}>
    {(title||actions)&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>{title&&<h3 style={{margin:0,fontSize:15,fontWeight:700,color:"#1B4332"}}>{title}</h3>}{actions&&<div style={{display:"flex",gap:8}}>{actions}</div>}</div>}
    {children}
  </div>
);
const StatCard = ({ label, value, sub, color="#1B4332" }) => (
  <div style={{ background:"#fff",borderRadius:12,padding:"18px 20px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:"1px solid #eef0f2",flex:"1 1 200px",minWidth:170 }}>
    <div style={{fontSize:11,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
    <div style={{fontSize:22,fontWeight:800,color,marginTop:4}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:"#999",marginTop:2}}>{sub}</div>}
  </div>
);
const Modal = ({ title, onClose, children, width=560 }) => (
  <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.45)",display:"flex",justifyContent:"center",alignItems:"flex-start",paddingTop:60,overflowY:"auto"}} onClick={onClose}>
    <div style={{background:"#fff",borderRadius:16,width:"90%",maxWidth:width,maxHeight:"85vh",overflow:"auto",padding:"28px 32px",boxShadow:"0 20px 60px rgba(0,0,0,0.2)",marginBottom:40}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:700,color:"#1B4332"}}>{title}</h2>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",padding:4,fontSize:20}}>✕</button>
      </div>
      {children}
    </div>
  </div>
);
const Table = ({ columns, data, onRowClick, emptyText="暂无数据" }) => (
  <div style={{overflowX:"auto"}}>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
      <thead><tr>{columns.map((c,i)=><th key={i} style={{textAlign:c.align||"left",padding:"10px 12px",borderBottom:"2px solid #e9ecef",fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:0.5,whiteSpace:"nowrap"}}>{c.title}</th>)}</tr></thead>
      <tbody>
        {data.length===0?<tr><td colSpan={columns.length} style={{padding:40,textAlign:"center",color:"#aaa"}}>{emptyText}</td></tr>
        :data.map((row,ri)=><tr key={row.id||ri} onClick={()=>onRowClick?.(row)} style={{cursor:onRowClick?"pointer":"default",transition:"background .1s"}} onMouseEnter={e=>(e.currentTarget.style.background="#f8f9fa")} onMouseLeave={e=>(e.currentTarget.style.background="transparent")}>
          {columns.map((c,ci)=><td key={ci} style={{padding:"10px 12px",borderBottom:"1px solid #f0f0f0",textAlign:c.align||"left",whiteSpace:c.nowrap?"nowrap":"normal"}}>{c.render?c.render(row[c.key],row,ri):row[c.key]}</td>)}
        </tr>)}
      </tbody>
    </table>
  </div>
);
const Tabs = ({ tabs, active, onChange }) => (
  <div style={{display:"flex",gap:0,borderBottom:"2px solid #e9ecef",marginBottom:16}}>
    {tabs.map(t=><button key={t.key} onClick={()=>onChange(t.key)} style={{padding:"10px 20px",fontSize:13,fontWeight:600,border:"none",borderBottom:active===t.key?"2px solid #1B4332":"2px solid transparent",color:active===t.key?"#1B4332":"#888",background:"none",cursor:"pointer",marginBottom:-2,transition:"all .15s"}}>{t.label}</button>)}
  </div>
);

// ═══════════════════════════════════════════════════════
// PRINT TEMPLATE - Matches the uploaded xlsx exactly
// ═══════════════════════════════════════════════════════
const PrintTemplate = ({ container, onClose }) => {
  const printRef = useRef();
  const c = container;
  const items = c.items || [];
  const totalBoxes = items.reduce((s,i) => s + (parseInt(i.qty)||0), 0);
  const totalKG = items.reduce((s,i) => s + (parseInt(i.qty)||0) * (parseFloat(i.kgPerBox)||0), 0);

  const handlePrint = () => {
    const content = printRef.current.innerHTML;
    const win = window.open('','_blank','width=900,height=700');
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>出库单 ${c.containerNo||''}</title>
    <style>@page{size:A4 landscape;margin:10mm;}body{font-family:'Times New Roman',serif;margin:0;padding:15px;}
    table{border-collapse:collapse;width:100%;}td,th{border:1px solid #000;padding:6px 8px;vertical-align:middle;font-size:13pt;}
    .hdr{text-align:center;font-weight:bold;font-size:13pt;}.green-bg{background:#EAF1DD;}
    .total-row{background:#FFFF00;color:#C00000;font-weight:bold;font-size:13pt;}
    .title{text-align:center;font-weight:bold;font-size:14pt;border:1px solid #000;padding:8px;}
    @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>
    </head><body>${content}</body></html>`);
    win.document.close();
    setTimeout(()=>{win.print();}, 500);
  };

  return (
    <Modal title="装车明细打印预览" onClose={onClose} width={860}>
      <div ref={printRef}>
        <table style={{borderCollapse:"collapse",width:"100%",fontFamily:"'Times New Roman',serif"}}>
          <tbody>
            {/* Row 1 - Title */}
            <tr>
              <td colSpan={6} style={{border:"1px solid #000",textAlign:"center",fontWeight:"bold",fontSize:14,padding:"8px"}}>
                NINH THAN CTY / 宁晨公司 — PHIẾU XUẤT KHO 出库单 NGÀY {c.exportDate || todayVN()}
              </td>
            </tr>
            {/* Row 2 - CONT / Truck head / Driver phone */}
            <tr>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px"}}>CONT</td>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:14,padding:"6px 8px"}}>{c.contSeq || ''}</td>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px"}}>Đầu xe 车头号</td>
              <td style={{border:"1px solid #000",fontSize:13,padding:"6px 8px"}}>{c.truckHead || ''}</td>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px"}}>SDT TÀI XẾ 司机的电话:</td>
              <td style={{border:"1px solid #000",fontSize:13,padding:"6px 8px"}}>{c.driverPhone || ''}</td>
            </tr>
            {/* Row 3 - Packaging code / Orchard code / Trailer / Border */}
            <tr>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px",whiteSpace:"pre-line"}}>{"Mã đóng gói\n包装码\n"+(c.packagingCode||'VN-TGPH-761')}</td>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px",whiteSpace:"pre-line"}}>{"Mã vùng trồng\n果园码\n"+(c.orchardCode||'')}</td>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px"}}>Đuôi xe 车尾号</td>
              <td style={{border:"1px solid #000",fontSize:13,padding:"6px 8px"}}>{c.truckTrailer || ''}</td>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px"}}>口岸: Nơi đến</td>
              <td style={{border:"1px solid #000",fontSize:13,padding:"6px 8px"}}>{c.borderGate || 'Cửa khẩu hữu Nghị 友谊关'}</td>
            </tr>
            {/* Row 4 - Brand / Container No / Export date / Temperature */}
            <tr>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px"}}>牌子{c.brand || ''}</td>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px"}}>Số cont 柜号</td>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px"}}>{c.containerNo || ''}</td>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px",whiteSpace:"pre-line"}}>{"NGÀY XUẤT CONT\n发柜日期"}</td>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px"}}>{c.exportDate || todayVN()}</td>
              <td style={{border:"1px solid #000",fontWeight:"bold",fontSize:13,padding:"6px 8px",whiteSpace:"pre-line"}}>{"Nhiệt độ xuất phát\n温度: "+(c.temperature||'')}</td>
            </tr>
            {/* Row 5 - Column headers (green background) */}
            <tr>
              <td style={{border:"1px solid #000",background:"#EAF1DD",textAlign:"center",fontWeight:"bold",fontSize:13,padding:"6px 8px",whiteSpace:"pre-line"}}>{"STT\n序号"}</td>
              <td style={{border:"1px solid #000",background:"#EAF1DD",textAlign:"center",fontWeight:"bold",fontSize:13,padding:"6px 8px",whiteSpace:"pre-line"}}>{"Loại\n级"}</td>
              <td style={{border:"1px solid #000",background:"#EAF1DD",textAlign:"center",fontWeight:"bold",fontSize:13,padding:"6px 8px",whiteSpace:"pre-line"}}>{"Quy cách\n规格"}</td>
              <td style={{border:"1px solid #000",background:"#EAF1DD",textAlign:"center",fontWeight:"bold",fontSize:13,padding:"6px 8px",whiteSpace:"pre-line"}}>{"Số lượng thùng\n箱子数量"}</td>
              <td style={{border:"1px solid #000",background:"#EAF1DD",textAlign:"center",fontWeight:"bold",fontSize:13,padding:"6px 8px",whiteSpace:"pre-line"}}>{"Kg/Thùng\n公斤"}</td>
              <td style={{border:"1px solid #000",background:"#EAF1DD",textAlign:"center",fontWeight:"bold",fontSize:13,padding:"6px 8px",whiteSpace:"pre-line"}}>{"Tổng số kg\n总公斤"}</td>
            </tr>
            {/* Data rows */}
            {items.map((item, i) => (
              <tr key={i}>
                <td style={{border:"1px solid #000",textAlign:"center",fontSize:13,padding:"5px 8px"}}>{i+1}</td>
                <td style={{border:"1px solid #000",fontSize:13,padding:"5px 8px"}}>{item.grade || ''}</td>
                <td style={{border:"1px solid #000",fontSize:13,padding:"5px 8px"}}>{item.spec || ''}</td>
                <td style={{border:"1px solid #000",textAlign:"center",fontSize:13,padding:"5px 8px"}}>{item.qty || ''}</td>
                <td style={{border:"1px solid #000",textAlign:"center",fontSize:13,padding:"5px 8px"}}>{item.kgPerBox || ''}</td>
                <td style={{border:"1px solid #000",textAlign:"center",fontSize:13,padding:"5px 8px",fontWeight:"bold"}}>{(parseInt(item.qty)||0)*(parseFloat(item.kgPerBox)||0) || ''}</td>
              </tr>
            ))}
            {/* Add empty rows if less than 3 items for better appearance */}
            {items.length < 3 && Array(3-items.length).fill(0).map((_,i)=>(
              <tr key={"empty"+i}>
                <td style={{border:"1px solid #000",padding:"5px 8px",height:22}}>&nbsp;</td>
                <td style={{border:"1px solid #000",padding:"5px 8px"}}>&nbsp;</td>
                <td style={{border:"1px solid #000",padding:"5px 8px"}}>&nbsp;</td>
                <td style={{border:"1px solid #000",padding:"5px 8px"}}>&nbsp;</td>
                <td style={{border:"1px solid #000",padding:"5px 8px"}}>&nbsp;</td>
                <td style={{border:"1px solid #000",padding:"5px 8px"}}>&nbsp;</td>
              </tr>
            ))}
            {/* Total row - yellow background, dark red text */}
            <tr>
              <td colSpan={3} style={{border:"1px solid #000",background:"#FFFF00",color:"#C00000",fontWeight:"bold",fontSize:13,padding:"8px"}}>TỔNG CỘNG 总共</td>
              <td style={{border:"1px solid #000",background:"#FFFF00",color:"#C00000",fontWeight:"bold",fontSize:13,padding:"8px",textAlign:"center"}}>{totalBoxes}</td>
              <td style={{border:"1px solid #000",background:"#FFFF00",padding:"8px"}}></td>
              <td style={{border:"1px solid #000",background:"#FFFF00",color:"#C00000",fontWeight:"bold",fontSize:13,padding:"8px",textAlign:"center"}}>{totalKG}</td>
            </tr>
          </tbody>
        </table>
        <div style={{marginTop:12,textAlign:"right",fontSize:12,fontFamily:"'Times New Roman',serif",color:"#666"}}>
          {c.printedBy || ''}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:20}}>
        <Btn variant="secondary" onClick={onClose}>关闭</Btn>
        <Btn onClick={handlePrint}>🖨️ 打印出库单</Btn>
      </div>
    </Modal>
  );
};

  const canEdit = ROLES[role]?.level >= 1;

  const emptyContainer = {

    exportDate: todayVN(), temperature:"",
    clientName:"", status:"preparing",
    items:[], // {grade, spec, qty, kgPerBox}

  const gradeOptions = [

    {value:"4头白色3条 trắng", label:"4头 白色3条 trắng (B级)"},
    {value:"5头红色4条 đỏ", label:"5头 红色4条 đỏ (C级)"},
    {value:"6头红色3条 đỏ", label:"6头 红色3条 đỏ (C级)"},

  const kgOptions = [{value:"9",label:"9"},{value:"9.5",label:"9.5"},{value:"10",label:"10"},{value:"10.5",label:"10.5"},{value:"11",label:"11"},{value:"14",label:"14"},{value:"18",label:"18"}];

  const openNew = () => { setEditItem({...emptyContainer, id:genId()}); setShowForm(true); };
  const openEdit = (c) => { setEditItem(JSON.parse(JSON.stringify(c))); setShowForm(true); };

  const addItem = () => {
    setEditItem({...editItem, items:[...(editItem.items||[]), {grade:"Thai A 金枕",spec:"3头黄色2条 vàng",qty:"",kgPerBox:"10"}]});
  };
  const updateItem = (idx,field,val) => {
    const items = [...editItem.items];
    items[idx] = {...items[idx],[field]:val};
    setEditItem({...editItem, items});
  };
  const removeItem = (idx) => {
    setEditItem({...editItem, items: editItem.items.filter((_,i)=>i!==idx)});
  };

  const saveFn = () => {
    const item = {...editItem};
    if(!item.createdBy) item.createdBy=currentUser?.id;
    item.lastEditBy=currentUser?.id;
    const totalBoxes = (item.items||[]).reduce((s,i)=>s+(parseInt(i.qty)||0),0);
    const totalKG = (item.items||[]).reduce((s,i)=>s+(parseInt(i.qty)||0)*(parseFloat(i.kgPerBox)||0),0);
    item.totalBoxes = totalBoxes;
    item.loadedWeight = totalKG;
    item.processingFee = totalKG * 15000;
    item.totalFee = item.processingFee + (item.loadingFee||3000000);

    const list = [...data.containers];
    const idx = list.findIndex(c=>c.id===item.id);
    const isNew = idx < 0;
    const wasCompleted = idx >= 0 && list[idx].status === "completed";
    if(idx>=0) list[idx]=item; else list.push(item);

    // ── Auto-deduct packaging & chemicals when status becomes "completed" ──
    let updatedPkg = [...(data.packaging||[])];
    let updatedChem = [...(data.chemicals||[])];
    if(item.status === "completed" && !wasCompleted && totalBoxes > 0) {
      // Deduct boxes matching brand
      updatedPkg = updatedPkg.map(p => {
        if(p.category === "box" && p.status !== "paused") {
          // Match brand in name or deduct from generic
          const nameMatch = item.brand && p.name && (p.name.toLowerCase().includes(item.brand.toLowerCase()) || p.brand === item.brand);
          const isGeneric = !p.brand && !BRANDS.some(b => p.name?.toLowerCase().includes(b.value.toLowerCase()));
          if(nameMatch || isGeneric) {
            return {...p, stock: Math.max(0, (p.stock||0) - totalBoxes)};
          }
        }
        return p;
      });
      // Deduct brand labels (1 per box)
      updatedPkg = updatedPkg.map(p => {
        if(p.category === "label" && p.status !== "paused") {
          const nameMatch = item.brand && p.name && (p.name.toLowerCase().includes(item.brand.toLowerCase()) || p.brand === item.brand);
          if(nameMatch) return {...p, stock: Math.max(0, (p.stock||0) - totalBoxes)};
        }
        return p;
      });
      // Deduct stem labels (1 per box * fruits per box avg ~4)
      updatedPkg = updatedPkg.map(p => {
        if(p.category === "stem" && p.status !== "paused") {
          const stemCount = totalBoxes * 4; // avg 4 fruits per box
          return {...p, stock: Math.max(0, (p.stock||0) - stemCount)};
        }
        return p;
      });
      // Deduct chemicals: 1 bag(1kg) per container
      updatedChem = updatedChem.map(c => {
        if(c.status !== "paused") {
          return {...c, stock: Math.max(0, (c.stock||0) - 1)};
        }
        return c;
      });
    }

    setData({...data, containers:list, packaging:updatedPkg, chemicals:updatedChem});
    save(SK.containers, list);
    save(SK.packaging, updatedPkg);
    save(SK.chemicals, updatedChem);
    setShowForm(false);
  };

  const removeFn = (id) => {
    if(!confirm("确认删除？")) return;
    const list = data.containers.filter(c=>c.id!==id);
    setData({...data, containers:list});
    save(SK.containers, list);
  };

  // Export all containers summary as printable page
  const exportAllPrint = () => {
    const cs = data.containers;
    if(cs.length===0){alert("暂无装车数据可导出");return;}
    const rows = cs.map((c,i)=>`<tr>
      <td>${c.contSeq||i+1}</td><td>${c.containerNo||'—'}</td><td>${c.brand||''}</td>
      <td>${c.clientName||''}</td><td>${c.exportDate||''}</td>
      <td style="text-align:right">${c.totalBoxes||0}</td>
      <td style="text-align:right">${(c.loadedWeight||0).toLocaleString()}</td>
      <td style="text-align:right">${new Intl.NumberFormat('vi-VN').format((c.loadedWeight||0)*15000)} ₫</td>
      <td style="text-align:right">3,000,000 ₫</td>
      <td style="text-align:right;font-weight:bold">${new Intl.NumberFormat('vi-VN').format((c.loadedWeight||0)*15000+3000000)} ₫</td>
    </tr>`).join('');
    const totalW=cs.reduce((s,c)=>s+(c.loadedWeight||0),0);
    const totalPF=totalW*15000;
    const totalLF=cs.length*3000000;
    const win=window.open('','_blank','width=1000,height=700');
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>装车汇总表</title>
    <style>@page{size:A4 landscape;margin:10mm;}body{font-family:'Times New Roman',serif;padding:20px;}
    table{border-collapse:collapse;width:100%;font-size:11pt;}td,th{border:1px solid #000;padding:5px 8px;}
    th{background:#EAF1DD;font-weight:bold;}
    .total{background:#FFFF00;color:#C00000;font-weight:bold;}
    h2{text-align:center;margin-bottom:15px;}
    @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>
    </head><body>
    <h2>宁晨公司 NINH THAN CTY — 装车明细汇总表 TỔNG HỢP XUẤT CONT</h2>
    <table><thead><tr><th>序号</th><th>柜号</th><th>品牌</th><th>客户</th><th>日期</th><th>件数</th><th>重量(KG)</th><th>加工费</th><th>装车费</th><th>合计</th></tr></thead>
    <tbody>${rows}
    <tr class="total"><td colspan="5">TỔNG CỘNG 总计 (${cs.length} 柜)</td>
    <td style="text-align:right">${cs.reduce((s,c)=>s+(c.totalBoxes||0),0)}</td>
    <td style="text-align:right">${totalW.toLocaleString()}</td>
    <td style="text-align:right">${new Intl.NumberFormat('vi-VN').format(totalPF)} ₫</td>
    <td style="text-align:right">${new Intl.NumberFormat('vi-VN').format(totalLF)} ₫</td>
    <td style="text-align:right">${new Intl.NumberFormat('vi-VN').format(totalPF+totalLF)} ₫</td></tr>
    </tbody></table>
    <p style="margin-top:20px;font-size:10pt;color:#666">导出时间: ${new Date().toLocaleString('zh-CN')}</p>
    </body></html>`);
    win.document.close();
    setTimeout(()=>{win.print();},500);
  };

  // Export CSV
  const exportCSV = () => {
    const cs = data.containers;
    if(cs.length===0){alert("暂无数据");return;}
    const header="序号,柜号,品牌,客户,发柜日期,总件数,总重量KG,加工费VND,装车费VND,合计VND,状态\n";
    const rows=cs.map((c,i)=>[
      c.contSeq||i+1, c.containerNo||'', c.brand||'', c.clientName||'', c.exportDate||'',
      c.totalBoxes||0, c.loadedWeight||0, (c.loadedWeight||0)*15000, 3000000,
      (c.loadedWeight||0)*15000+3000000, c.status==="completed"?"已完成":c.status==="loading"?"装车中":"准备中"
    ].join(",")).join("\n");
    const BOM="\uFEFF";
    const blob=new Blob([BOM+header+rows],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`装车明细_${today()}.csv`;a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

        <div style={{display:"flex",gap:8}}>

      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <StatCard label="总装车数" value={data.containers.length} />
        <StatCard label="总加工费收入" value={fmtVND(data.containers.reduce((s,c)=>s+((c.loadedWeight||0)*15000),0))} color="#27ae60" />
        <StatCard label="装车费收入" value={fmtVND(data.containers.length*3000000)} color="#2980b9" />
        <StatCard label="加工费标准" value="15,000₫/KG" sub="装车费 3,000,000₫/柜" />
      </div>
      <Card>
        <Table
          columns={[
            {title:"序号",key:"contSeq",render:v=><strong>{v||"—"}</strong>},

            {title:"品牌",key:"brand"},

            {title:"总重量(KG)",key:"loadedWeight",render:v=>v?v.toLocaleString():"—",align:"right"},
            {title:"加工费",key:"loadedWeight",render:v=>fmtVND((v||0)*15000),align:"right"},
            {title:"状态",key:"status",render:v=><Badge color={v==="completed"?"#27ae60":v==="loading"?"#f39c12":"#3498db"}>{v==="completed"?"已完成":v==="loading"?"装车中":"准备中"}</Badge>},
            {title:"操作",key:"id",align:"center",render:(_,row)=>(
              <div style={{display:"flex",gap:4,justifyContent:"center"}}>
                {canEdit&&<Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();openEdit(row);}}>编辑</Btn>}
                <Btn size="sm" variant="secondary" onClick={e=>{e.stopPropagation();setShowPrint(row);}}>🖨️打印</Btn>
                {canEdit&&<Btn size="sm" variant="danger" onClick={e=>{e.stopPropagation();removeFn(row.id);}}>删</Btn>}
              </div>
            )},
          ]}
          data={data.containers}
        />
      </Card>

      {showForm && editItem && (
        <Modal title={editItem.containerNo?"编辑装车单":"新建装车单 (出库单)"} onClose={()=>setShowForm(false)} width={780}>
          <div style={{background:"#f0fdf4",borderRadius:8,padding:"12px 16px",marginBottom:16,fontSize:12,color:"#1B4332"}}>
            <strong>出库单字段说明：</strong>按照 PHIẾU XUẤT KHO 模版，填写以下信息后可直接打印
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 16px"}}>
            <Input label="CONT序号" value={editItem.contSeq} onChange={v=>setEditItem({...editItem,contSeq:v})} placeholder="1, 2, 3..." />
            <Input label="柜号 Số cont" value={editItem.containerNo} onChange={v=>setEditItem({...editItem,containerNo:v})} required placeholder="CICU 7635273" />
            <Input label="品牌 牌子" value={editItem.brand} onChange={v=>setEditItem({...editItem,brand:v})}
              options={BRANDS} />
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 16px"}}>
            <Input label="车头号 Đầu xe" value={editItem.truckHead} onChange={v=>setEditItem({...editItem,truckHead:v})} placeholder="98H-02676" />
            <Input label="车尾号 Đuôi xe" value={editItem.truckTrailer} onChange={v=>setEditItem({...editItem,truckTrailer:v})} placeholder="98R-02784" />

          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 16px"}}>
            <Input label="包装码 Mã đóng gói" value={editItem.packagingCode} onChange={v=>setEditItem({...editItem,packagingCode:v})} placeholder="VN-TGPH-761" />

          </div>
          <Input label="状态" value={editItem.status} onChange={v=>setEditItem({...editItem,status:v})}

          {/* Items table */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:16,marginBottom:8}}>
            <span style={{fontSize:14,fontWeight:700,color:"#1B4332"}}>装箱明细 (Loại / Quy cách / Số lượng)</span>

              </div>
              <button onClick={()=>removeItem(i)} style={{background:"none",border:"none",cursor:"pointer",padding:8,color:"#e74c3c",fontSize:16}}>✕</button>
            </div>
          ))}

          {(editItem.items||[]).length>0 && (
            <div style={{background:"#FFFFF0",border:"2px solid #f39c12",borderRadius:8,padding:14,marginTop:12}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,fontSize:13}}>
                <div>总件数: <strong style={{color:"#C00000",fontSize:16}}>{(editItem.items||[]).reduce((s,i)=>s+(parseInt(i.qty)||0),0)}</strong></div>
                <div>总重量: <strong style={{color:"#C00000",fontSize:16}}>{((editItem.items||[]).reduce((s,i)=>s+(parseInt(i.qty)||0)*(parseFloat(i.kgPerBox)||0),0)).toLocaleString()} KG</strong></div>
                <div>加工费: <strong style={{color:"#27ae60"}}>{fmtVND((editItem.items||[]).reduce((s,i)=>s+(parseInt(i.qty)||0)*(parseFloat(i.kgPerBox)||0),0)*15000)}</strong></div>

            </div>
          )}

          <Input label="制表人 / 签名" value={editItem.printedBy} onChange={v=>setEditItem({...editItem,printedBy:v})} style={{marginTop:12}} placeholder="如: TH-LƯƠNG" />
          <Input label="备注" type="textarea" value={editItem.notes} onChange={v=>setEditItem({...editItem,notes:v})} />
          <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}>
            <Btn variant="secondary" onClick={()=>setShowForm(false)}>取消</Btn>
            <Btn onClick={saveFn}>保存</Btn>
          </div>
        </Modal>
      )}

      {showPrint && <PrintTemplate container={showPrint} onClose={()=>setShowPrint(null)} />}
    </div>
  );
};

// Purchase Module - 收果管理 Quản lý thu mua (重构版)
// 完全匹配收果账单实际结构
// ═══════════════════════════════════════════════════════
const PurchaseModule = ({ data, setData, role, currentUser }) => {
  const [showForm,setShowForm]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [tab,setTab]=useState("list");
  const [filterClient,setFilterClient]=useState("all");
  const [filterSource,setFilterSource]=useState("all");
  const canEdit=ROLES[role]?.level>=1;
  const isAdmin=ROLES[role]?.level>=3;

  const empty={
    id:"", date:today(),
    // 基本信息
    clientCode:"",     // 客户号: 姚总Dao / 金总Tống 等
    sourceType:"vendor", // vendor=买手Lái / orchard=果园Vườn
    supplierName:"",   // 买手/果园名 Lái bán
    vehicleNo:"",      // 车号 Biển số xe
    returnVehicle:"",  // 回厂车号
    introducer:"",     // 介绍人 Người giới thiệu
    variety:"Thai",    // 品种: Thai/Musaking
    // 分级重量 (KG)
    gradeA:"", gradeB:"", gradeC:"",
    cop2:"",           // Cốp 2 (2算1)
    gradeD:"",         // D果 Dạt đóng
    gradeDMeat:"",     // 剥肉 Dạt lột
    kem:"",            // 烂果 Kem
    chinDong:"",       // 液氮熟果 Chín đóng
    chinLot:"",        // 熟果剥肉 Chín lột
    // 各等级单价 (VND/KG)
    priceA:"", priceB:"", priceC:"",
    priceCop2:"", priceD:"", priceDMeat:"",
    priceKem:"", priceChinDong:"", priceChinLot:"",
    // 结算
    totalAmount:"",    // 金额 Thành tiền (自动计算)
    actualPaid:"",     // 实际支付 Thực tế
    depositDeduct:"",  // 押金抵扣 Trừ cọc
    // 介绍费
    commissionRate:"", // 介绍费单价 (如1000₫/kg)
    commissionTotal:"",// 介绍费总额
    notes:"",
  };

  const openNew=()=>{setEditItem({...empty,id:genId()});setShowForm(true);};
  const openEdit=p=>{setEditItem({...p});setShowForm(true);};

  // Auto-calculate totals
  const calcTotal=(item)=>{
    const n=(k)=>parseFloat(item[k])||0;
    const totalKG = n("gradeA")+n("gradeB")+n("gradeC")+n("cop2")+n("gradeD")+n("gradeDMeat")+n("kem")+n("chinDong")+n("chinLot");
    const amount = n("gradeA")*n("priceA") + n("gradeB")*n("priceB") + n("gradeC")*n("priceC")
      + n("cop2")*n("priceCop2") + n("gradeD")*n("priceD") + n("gradeDMeat")*n("priceDMeat")
      + n("kem")*n("priceKem") + n("chinDong")*n("priceChinDong") + n("chinLot")*n("priceChinLot");
    const commTotal = totalKG * n("commissionRate");
    const actualPaid = amount - n("depositDeduct");
    return { totalKG, amount, commTotal, actualPaid };
  };

  const saveFn=()=>{
    const item={...editItem};
    if(!item.createdBy) item.createdBy=currentUser?.id; // stamp creator on new records
    item.lastEditBy=currentUser?.id; item.lastEditTime=new Date().toLocaleString("zh-CN");
    const calc=calcTotal(item);
    item.totalKG=calc.totalKG;
    item.totalAmount=calc.amount;
    item.commissionTotal=calc.commTotal;
    if(!item.actualPaid) item.actualPaid=calc.actualPaid;
    item.netWeight=calc.totalKG;
    item.grades={A:parseFloat(item.gradeA)||0,B:parseFloat(item.gradeB)||0,C:parseFloat(item.gradeC)||0,D:(parseFloat(item.gradeD)||0)+(parseFloat(item.gradeDMeat)||0)};
    item.totalCost=calc.amount;
    item.source=item.sourceType;
    const list=[...data.purchases];const idx=list.findIndex(p=>p.id===item.id);
    if(idx>=0) list[idx]=item; else list.push(item);
    setData({...data,purchases:list});save(SK.purchases,list);setShowForm(false);
  };
  const removeFn=id=>{
    const record=data.purchases.find(p=>p.id===id);
    if(!canUserEdit(role,currentUser?.id,record)){alert("无权删除他人记录 Không có quyền xóa");return;}
    if(!confirm("确认删除？Xác nhận xóa?"))return;
    const list=data.purchases.filter(p=>p.id!==id);setData({...data,purchases:list});save(SK.purchases,list);
  };

  const purchases=data.purchases||[];
  const clients=[...new Set(purchases.map(p=>p.clientCode).filter(Boolean))];
  const filtered=purchases.filter(p=>{
    if(filterClient!=="all"&&p.clientCode!==filterClient)return false;
    if(filterSource!=="all"&&p.sourceType!==filterSource)return false;
    return true;
  });

  const totalA=filtered.reduce((s,p)=>s+(parseFloat(p.gradeA)||0),0);
  const totalB=filtered.reduce((s,p)=>s+(parseFloat(p.gradeB)||0),0);
  const totalC=filtered.reduce((s,p)=>s+(parseFloat(p.gradeC)||0),0);
  const totalD=filtered.reduce((s,p)=>s+(parseFloat(p.gradeD)||0)+(parseFloat(p.gradeDMeat)||0),0);
  const totalKem=filtered.reduce((s,p)=>s+(parseFloat(p.kem)||0),0);
  const totalAllKG=filtered.reduce((s,p)=>s+(p.totalKG||0),0);
  const totalCost=filtered.reduce((s,p)=>s+(p.totalAmount||0),0);
  const totalComm=filtered.reduce((s,p)=>s+(p.commissionTotal||0),0);

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:800,color:"#1B4332"}}>🛒 收果管理 Quản lý thu mua</h2>
        {canEdit&&<Btn onClick={openNew}>+ 新增收果 Thêm phiếu mua</Btn>}
      </div>

      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <StatCard label="总收果量 Tổng KG" value={totalAllKG.toLocaleString()+" kg"} sub={`${filtered.length} 批次 lô`} />
        <StatCard label="A级 Loại A" value={totalA.toLocaleString()+" kg"} color="#27ae60" />
        <StatCard label="B级 Loại B" value={totalB.toLocaleString()+" kg"} color="#2980b9" />
        <StatCard label="C级+D级" value={(totalC+totalD).toLocaleString()+" kg"} color="#f39c12" />
        <StatCard label="烂果Kem" value={totalKem.toLocaleString()+" kg"} color="#e74c3c" />
        <StatCard label="总金额 Tổng tiền" value={fmtVND(totalCost)} color="#8e44ad" />
      </div>

      <Tabs tabs={[{key:"list",label:"收果记录 DS thu mua"},{key:"summary",label:"客户汇总 TH khách"},{key:"commission",label:"介绍费 Hoa hồng"}]} active={tab} onChange={setTab} />

      {tab==="list"&&<Card>
        <div style={{display:"flex",gap:12,marginBottom:12,flexWrap:"wrap"}}>
          <Input label="" value={filterClient} onChange={setFilterClient} options={[{value:"all",label:"全部客户 Tất cả"},...clients.map(c=>({value:c,label:c}))]} style={{marginBottom:0,minWidth:140}} />
          <Input label="" value={filterSource} onChange={setFilterSource} options={[{value:"all",label:"全部来源"},{value:"vendor",label:"买手 Lái"},{value:"orchard",label:"果园 Vườn"}]} style={{marginBottom:0,minWidth:130}} />
        </div>
        <Table columns={[
          {title:"日期 Ngày",key:"date",nowrap:true},
          {title:"客户 Khách",key:"clientCode",render:v=><strong>{v||"—"}</strong>},
          {title:"来源",key:"sourceType",render:v=><Badge color={v==="vendor"?"#3498db":"#27ae60"}>{v==="vendor"?"买手Lái":"果园Vườn"}</Badge>},
          {title:"卖方 Người bán",key:"supplierName"},
          {title:"车号 Xe",key:"vehicleNo",render:v=><span style={{fontFamily:"monospace",fontSize:11}}>{v||"—"}</span>},
          {title:"A(kg)",key:"gradeA",align:"right",render:v=>v?parseFloat(v).toLocaleString():""},
          {title:"B(kg)",key:"gradeB",align:"right",render:v=>v?parseFloat(v).toLocaleString():""},
          {title:"C(kg)",key:"gradeC",align:"right",render:v=>v?parseFloat(v).toLocaleString():""},
          {title:"D/剥肉",key:"gradeD",align:"right",render:(v,r)=>{const d=(parseFloat(v)||0)+(parseFloat(r.gradeDMeat)||0);return d?d.toLocaleString():"";}},
          {title:"总量 Tổng",key:"totalKG",align:"right",render:v=><strong>{v?v.toLocaleString():""}</strong>},
          {title:"金额 Tiền",key:"totalAmount",align:"right",render:v=>v?fmtVND(v):"—"},
          {title:"操作人",key:"createdBy",render:v=>{const u=(data.users||[]).find(x=>x.id===v);return u?<span style={{fontSize:11,color:"#888"}}>{u.name}</span>:<span style={{fontSize:11,color:"#ccc"}}>—</span>;}},
          {title:"操作",key:"id",align:"center",render:(_,row)=>{
            const mine=canUserEdit(role,currentUser?.id,row);
            return canEdit&&mine?<div style={{display:"flex",gap:4,justifyContent:"center"}}><Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();openEdit(row);}}>编辑</Btn><Btn size="sm" variant="danger" onClick={e=>{e.stopPropagation();removeFn(row.id);}}>删</Btn></div>
            :canEdit&&!mine?<span style={{fontSize:10,color:"#ccc"}}>他人数据</span>:null;
          }},
        ]} data={filtered} emptyText="暂无收果记录 Chưa có phiếu thu mua" />
      </Card>}

      {tab==="summary"&&<Card title="按客户汇总 Tổng hợp theo khách hàng">
        <Table columns={[
          {title:"客户 Khách",key:"client",render:v=><strong>{v}</strong>},
          {title:"批次 Số lô",key:"count",align:"right"},
          {title:"A(kg)",key:"a",align:"right",render:v=>v.toLocaleString()},
          {title:"B(kg)",key:"b",align:"right",render:v=>v.toLocaleString()},
          {title:"C(kg)",key:"c",align:"right",render:v=>v.toLocaleString()},
          {title:"D(kg)",key:"d",align:"right",render:v=>v.toLocaleString()},
          {title:"总量kg",key:"total",align:"right",render:v=><strong>{v.toLocaleString()}</strong>},
          {title:"总金额",key:"amount",align:"right",render:v=><strong>{fmtVND(v)}</strong>},
        ]} data={clients.map(c=>{
          const ps=purchases.filter(p=>p.clientCode===c);
          return {id:c,client:c,count:ps.length,
            a:ps.reduce((s,p)=>s+(parseFloat(p.gradeA)||0),0),
            b:ps.reduce((s,p)=>s+(parseFloat(p.gradeB)||0),0),
            c:ps.reduce((s,p)=>s+(parseFloat(p.gradeC)||0),0),
            d:ps.reduce((s,p)=>s+(parseFloat(p.gradeD)||0)+(parseFloat(p.gradeDMeat)||0),0),
            total:ps.reduce((s,p)=>s+(p.totalKG||0),0),
            amount:ps.reduce((s,p)=>s+(p.totalAmount||0),0),
          };
        })} />
      </Card>}

      {tab==="commission"&&<Card title="介绍费汇总 Tổng hợp hoa hồng">
        <Table columns={[
          {title:"日期",key:"date",nowrap:true},
          {title:"卖方",key:"supplierName"},{title:"介绍人",key:"introducer"},
          {title:"总量kg",key:"totalKG",align:"right",render:v=>v?v.toLocaleString():"—"},
          {title:"费率₫/kg",key:"commissionRate",align:"right",render:v=>v?fmtVND(parseFloat(v)):"—"},
          {title:"介绍费",key:"commissionTotal",align:"right",render:v=>v?<strong style={{color:"#e67e22"}}>{fmtVND(v)}</strong>:"—"},
        ]} data={purchases.filter(p=>p.commissionTotal>0)} emptyText="暂无介绍费记录" />
        {totalComm>0&&<div style={{textAlign:"right",marginTop:12,fontSize:15,fontWeight:800,color:"#e67e22"}}>介绍费合计: {fmtVND(totalComm)}</div>}
      </Card>}

      {/* ── 收果录入表单 ── */}
      {showForm&&editItem&&(
        <Modal title="收果录入 Phiếu thu mua" onClose={()=>setShowForm(false)} width={780}>
          {/* 基本信息 */}
          <div style={{fontSize:13,fontWeight:700,color:"#1B4332",marginBottom:8}}>基本信息 Thông tin cơ bản</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 16px"}}>
            <Input label="日期 Ngày" type="date" value={editItem.date} onChange={v=>setEditItem({...editItem,date:v})} required />
            <Input label="客户号 Mã khách" value={editItem.clientCode} onChange={v=>setEditItem({...editItem,clientCode:v})} required placeholder="姚总Dao / 金总Tống" />
            <Input label="来源 Nguồn" value={editItem.sourceType} onChange={v=>setEditItem({...editItem,sourceType:v})}
              options={[{value:"vendor",label:"买手 Lái"},{value:"orchard",label:"果园 Vườn"}]} />
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 16px"}}>
            <Input label="卖方/果园名 Người bán" value={editItem.supplierName} onChange={v=>setEditItem({...editItem,supplierName:v})} required placeholder="Lê Thị Thu Thảo" />
            <Input label="车号 Biển số xe" value={editItem.vehicleNo} onChange={v=>setEditItem({...editItem,vehicleNo:v})} placeholder="47C36032" />
            <Input label="介绍人 Người giới thiệu" value={editItem.introducer} onChange={v=>setEditItem({...editItem,introducer:v})} placeholder="Tiến / Hổ / Mã" />
          </div>
          <Input label="品种 Giống" value={editItem.variety} onChange={v=>setEditItem({...editItem,variety:v})}
            options={[{value:"Thai",label:"Thai 金枕"},{value:"Musaking",label:"Musaking 猫山王"}]} style={{maxWidth:250}} />

          {/* 分级重量 + 单价 */}
          <div style={{fontSize:13,fontWeight:700,color:"#1B4332",marginBottom:8,marginTop:12}}>分级重量(KG) & 单价(₫/KG) — Phân loại & Đơn giá</div>
          <div style={{background:"#f8f9fa",borderRadius:10,padding:16,marginBottom:12}}>
            <div style={{display:"grid",gridTemplateColumns:"120px 1fr 1fr",gap:"4px 12px",fontSize:12,alignItems:"center"}}>
              <div style={{fontWeight:700,color:"#888"}}>等级 Loại</div>
              <div style={{fontWeight:700,color:"#888",textAlign:"center"}}>重量KG Trọng lượng</div>
              <div style={{fontWeight:700,color:"#888",textAlign:"center"}}>单价₫/KG Đơn giá</div>

              <div><Badge color="#27ae60">A级 Nhất</Badge></div>
              <Input label="" type="number" value={editItem.gradeA} onChange={v=>setEditItem({...editItem,gradeA:v})} suffix="kg" style={{marginBottom:4}} />
              <Input label="" type="number" value={editItem.priceA} onChange={v=>setEditItem({...editItem,priceA:v})} suffix="₫" style={{marginBottom:4}} />

              <div><Badge color="#2980b9">B级</Badge></div>
              <Input label="" type="number" value={editItem.gradeB} onChange={v=>setEditItem({...editItem,gradeB:v})} suffix="kg" style={{marginBottom:4}} />
              <Input label="" type="number" value={editItem.priceB} onChange={v=>setEditItem({...editItem,priceB:v})} suffix="₫" style={{marginBottom:4}} />

              <div><Badge color="#f39c12">C级</Badge></div>
              <Input label="" type="number" value={editItem.gradeC} onChange={v=>setEditItem({...editItem,gradeC:v})} suffix="kg" style={{marginBottom:4}} />
              <Input label="" type="number" value={editItem.priceC} onChange={v=>setEditItem({...editItem,priceC:v})} suffix="₫" style={{marginBottom:4}} />

              <div><span style={{fontSize:11,color:"#888"}}>Cốp2(2算1)</span></div>
              <Input label="" type="number" value={editItem.cop2} onChange={v=>setEditItem({...editItem,cop2:v})} suffix="kg" style={{marginBottom:4}} />
              <Input label="" type="number" value={editItem.priceCop2} onChange={v=>setEditItem({...editItem,priceCop2:v})} suffix="₫" style={{marginBottom:4}} />

              <div><Badge color="#e74c3c">D果 Dạt đóng</Badge></div>
              <Input label="" type="number" value={editItem.gradeD} onChange={v=>setEditItem({...editItem,gradeD:v})} suffix="kg" style={{marginBottom:4}} />
              <Input label="" type="number" value={editItem.priceD} onChange={v=>setEditItem({...editItem,priceD:v})} suffix="₫" style={{marginBottom:4}} />

              <div><span style={{fontSize:11,color:"#888"}}>剥肉 Dạt lột</span></div>
              <Input label="" type="number" value={editItem.gradeDMeat} onChange={v=>setEditItem({...editItem,gradeDMeat:v})} suffix="kg" style={{marginBottom:4}} />
              <Input label="" type="number" value={editItem.priceDMeat} onChange={v=>setEditItem({...editItem,priceDMeat:v})} suffix="₫" style={{marginBottom:4}} />

              <div><span style={{fontSize:11,color:"#e74c3c"}}>烂果 Kem</span></div>
              <Input label="" type="number" value={editItem.kem} onChange={v=>setEditItem({...editItem,kem:v})} suffix="kg" style={{marginBottom:4}} />
              <Input label="" type="number" value={editItem.priceKem} onChange={v=>setEditItem({...editItem,priceKem:v})} suffix="₫" style={{marginBottom:4}} />

              <div><span style={{fontSize:11,color:"#8e44ad"}}>液氮熟果 Chín đóng</span></div>
              <Input label="" type="number" value={editItem.chinDong} onChange={v=>setEditItem({...editItem,chinDong:v})} suffix="kg" style={{marginBottom:4}} />
              <Input label="" type="number" value={editItem.priceChinDong} onChange={v=>setEditItem({...editItem,priceChinDong:v})} suffix="₫" style={{marginBottom:4}} />

              <div><span style={{fontSize:11,color:"#8e44ad"}}>熟果剥肉 Chín lột</span></div>
              <Input label="" type="number" value={editItem.chinLot} onChange={v=>setEditItem({...editItem,chinLot:v})} suffix="kg" style={{marginBottom:4}} />
              <Input label="" type="number" value={editItem.priceChinLot} onChange={v=>setEditItem({...editItem,priceChinLot:v})} suffix="₫" style={{marginBottom:4}} />
            </div>
          </div>

          {/* 自动计算汇总 */}
          {(()=>{const c=calcTotal(editItem);return c.totalKG>0?(
            <div style={{background:"#FFFFF0",border:"2px solid #f39c12",borderRadius:8,padding:14,marginBottom:12}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,fontSize:13}}>
                <div>总重量: <strong style={{color:"#C00000",fontSize:16}}>{c.totalKG.toLocaleString()} kg</strong></div>
                <div>果款总额: <strong style={{color:"#C00000",fontSize:16}}>{fmtVND(c.amount)}</strong></div>
                <div>介绍费: <strong style={{color:"#e67e22"}}>{fmtVND(c.commTotal)}</strong></div>
              </div>
            </div>
          ):null;})()}

          {/* 结算信息 */}
          <div style={{fontSize:13,fontWeight:700,color:"#1B4332",marginBottom:8}}>结算 Thanh toán</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 16px"}}>
            <Input label="押金抵扣 Trừ cọc" type="number" value={editItem.depositDeduct} onChange={v=>setEditItem({...editItem,depositDeduct:v})} suffix="₫" />
            <Input label="实际支付 Thực tế" type="number" value={editItem.actualPaid} onChange={v=>setEditItem({...editItem,actualPaid:v})} suffix="₫" />
            <Input label="介绍费率 Phí ₫/kg" type="number" value={editItem.commissionRate} onChange={v=>setEditItem({...editItem,commissionRate:v})} suffix="₫/kg" placeholder="1000" />
          </div>
          <Input label="备注 Ghi chú" type="textarea" value={editItem.notes} onChange={v=>setEditItem({...editItem,notes:v})} />
          <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}>
            <Btn variant="secondary" onClick={()=>setShowForm(false)}>取消 Hủy</Btn>
            <Btn onClick={saveFn}>保存 Lưu</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════
// Orchard Module (果园直采)
// ═══════════════════════════════════════════════════════
const OrchardModule = ({ data, setData, role }) => {
  const [showForm,setShowForm]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [tab,setTab]=useState("contracts");
  const isAdmin=role==="admin"; // Level 3 only sees all
  const canEdit=isAdmin; // Only admin can edit orchard contracts
  const empty={id:"",orchardName:"",farmerName:"",farmerPhone:"",location:"",contractDate:today(),estTotalKG:"",pricePerKG:"",depositRate:0.2,estGrades:{A:"",B:"",C:"",D:""},actualGrades:{A:"",B:"",C:"",D:""},actualTotalKG:"",status:"contracted",techStaff:"",notes:""};
  const openNew=()=>{setEditItem({...empty,id:genId()});setShowForm(true);};
  const openEdit=o=>{setEditItem(JSON.parse(JSON.stringify(o)));setShowForm(true);};
  const saveFn=()=>{
    const item={...editItem};item.estTotalKG=parseFloat(item.estTotalKG)||0;item.pricePerKG=parseFloat(item.pricePerKG)||0;
    item.estTotalCost=item.estTotalKG*item.pricePerKG;item.depositAmount=item.estTotalCost*0.2;item.actualTotalKG=parseFloat(item.actualTotalKG)||0;
    const egs={},ags={};["A","B","C","D"].forEach(g=>{egs[g]=parseFloat(item.estGrades[g])||0;ags[g]=parseFloat(item.actualGrades[g])||0;});
    item.estGrades=egs;item.actualGrades=ags;
    const list=[...data.orchards];const idx=list.findIndex(o=>o.id===item.id);if(idx>=0)list[idx]=item;else list.push(item);
    setData({...data,orchards:list});save(SK.orchards,list);setShowForm(false);
  };
  const removeFn=id=>{if(!confirm("确认删除？"))return;const list=data.orchards.filter(o=>o.id!==id);setData({...data,orchards:list});save(SK.orchards,list);};

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:800,color:"#1B4332"}}>🌴 果园直采管理 Mua trực tiếp từ vườn</h2>
        {canEdit&&<Btn onClick={openNew}>+ 新增果园合同 Thêm hợp đồng</Btn>}
      </div>

      {/* 权限提示 - 非管理员看到的提示 */}
      {!isAdmin&&<div style={{background:"#FFF3E0",borderRadius:8,padding:"10px 16px",marginBottom:16,fontSize:12,color:"#E65100",display:"flex",alignItems:"center",gap:8}}>
        🔒 <span>机密信息 Thông tin bảo mật — 您仅可查看果园名称和重量明细，价格/金额/合同信息仅管理员可见</span>
      </div>}

      {/* 统计卡片 - 管理员看全部，其余只看数量和重量 */}
      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <StatCard label="合同果园 Số vườn" value={data.orchards.length} />
        <StatCard label="预估总量 Tổng ước tính" value={fmtKG(data.orchards.reduce((s,o)=>s+(o.estTotalKG||0),0))} color="#2980b9" />
        <StatCard label="实采总量 Tổng thực tế" value={fmtKG(data.orchards.reduce((s,o)=>s+(o.actualTotalKG||0),0))} color="#27ae60" />
        {isAdmin&&<StatCard label="合同总额 Tổng HĐ" value={fmtVND(data.orchards.reduce((s,o)=>s+(o.estTotalCost||0),0))} color="#e74c3c" />}
        {isAdmin&&<StatCard label="已付意向金 Đã cọc" value={fmtVND(data.orchards.reduce((s,o)=>s+(o.depositAmount||0),0))} color="#f39c12" />}
      </div>

      <Tabs tabs={[
        {key:"contracts",label:"果园列表 DS vườn"},
        {key:"weight",label:"重量明细 Chi tiết KG"},
        ...(isAdmin?[{key:"assessment",label:"技术考核 Đánh giá KT"},{key:"settlement",label:"合同结算 Thanh toán"}]:[]),
      ]} active={tab} onChange={setTab} />

      {/* 合同列表 - 根据权限显示不同列 */}
      {tab==="contracts"&&<Card>
        <Table columns={[
          {title:"果园 Vườn",key:"orchardName",render:v=><strong>{v||"—"}</strong>},
          {title:"果农 Chủ vườn",key:"farmerName"},
          ...(isAdmin?[{title:"电话 SĐT",key:"farmerPhone"}]:[]),
          ...(isAdmin?[{title:"位置 Địa điểm",key:"location"}]:[]),
          {title:"技术员 KT",key:"techStaff"},
          {title:"预估量 Ước tính",key:"estTotalKG",render:v=>fmtKG(v),align:"right"},
          {title:"实采量 Thực tế",key:"actualTotalKG",render:v=>v?fmtKG(v):"待采",align:"right"},
          ...(isAdmin?[
            {title:"单价 Đơn giá",key:"pricePerKG",render:v=>fmtVND(v)+"/kg",align:"right"},
            {title:"合同额 Giá trị HĐ",key:"estTotalCost",render:v=>fmtVND(v),align:"right"},
            {title:"意向金 Cọc",key:"depositAmount",render:v=>fmtVND(v),align:"right"},
          ]:[]),
          {title:"状态 TT",key:"status",render:v=><Badge color={v==="completed"?"#27ae60":v==="harvesting"?"#f39c12":"#3498db"}>{v==="completed"?"已完成":v==="harvesting"?"采摘中":"已签约"}</Badge>},
          ...(canEdit?[{title:"操作",key:"id",align:"center",render:(_,row)=><div style={{display:"flex",gap:4,justifyContent:"center"}}>
            <Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();openEdit(row);}}>编辑</Btn>
            <Btn size="sm" variant="danger" onClick={e=>{e.stopPropagation();removeFn(row.id);}}>删</Btn>
          </div>}]:[]),
        ]} data={data.orchards} />
      </Card>}

// ═══════════════════════════════════════════════════════
// Process Module (加工管理)
// ═══════════════════════════════════════════════════════
const ProcessModule = ({ data, setData, role, currentUser }) => {
  const [showForm,setShowForm]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const canEdit=ROLES[role]?.level>=1;
  const stepLabels={unload:"卸车分级称重",wash:"清洗清洁",disinfect:"泡药消毒",drying:"上架风干(~10h)",labeling:"贴品牌标签",packing:"打包装箱",ferment:"发酵(24-48h)",ready:"待装车"};
  const empty={id:"",batchNo:"",startDate:today(),rawWeight:"",processedWeight:"",steps:Object.fromEntries(Object.keys(stepLabels).map(k=>[k,{done:false,time:""}])),status:"receiving",loss:"",notes:""};
  const openNew=()=>{setEditItem({...empty,id:genId(),batchNo:"B"+Date.now().toString().slice(-6)});setShowForm(true);};
  const openEdit=b=>{setEditItem(JSON.parse(JSON.stringify(b)));setShowForm(true);};
  const saveFn=()=>{
    const item={...editItem};if(!item.createdBy)item.createdBy=currentUser?.id;item.lastEditBy=currentUser?.id;
    item.rawWeight=parseFloat(item.rawWeight)||0;item.processedWeight=parseFloat(item.processedWeight)||0;item.loss=item.rawWeight-item.processedWeight;
    const list=[...data.batches];const idx=list.findIndex(b=>b.id===item.id);if(idx>=0)list[idx]=item;else list.push(item);
    setData({...data,batches:list});save(SK.batches,list);setShowForm(false);
  };
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:800,color:"#1B4332"}}>⚙️ 加工流程管理 Quản lý chế biến</h2>
        {canEdit&&<Btn onClick={openNew}>+ 新建批次</Btn>}
      </div>
      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <StatCard label="活跃批次" value={data.batches.filter(b=>b.status!=="completed").length} />
        <StatCard label="总损耗" value={fmtKG(data.batches.reduce((s,b)=>s+(b.loss||0),0))} color="#e74c3c" />
        <StatCard label="场内加工费率" value="1,600₫/KG" color="#2980b9" />
      </div>
      <Card><Table columns={[
        {title:"批次号",key:"batchNo",render:v=><strong style={{fontFamily:"monospace"}}>{v}</strong>},
        {title:"日期",key:"startDate",nowrap:true},
        {title:"原料重量",key:"rawWeight",render:v=>fmtKG(v),align:"right"},
        {title:"成品重量",key:"processedWeight",render:v=>v?fmtKG(v):"—",align:"right"},
        {title:"损耗",key:"loss",align:"right",render:(v,r)=>{if(!r.processedWeight)return"—";const l=r.rawWeight-(r.processedWeight||r.rawWeight);const ok=l>=450&&l<=700;return <span style={{color:ok?"#27ae60":"#e74c3c",fontWeight:700}}>{fmtKG(l)}{!ok&&l>0?(l>700?" ⚠️偏高":" ⚠️偏低"):""}</span>;}},
        {title:"状态",key:"status",render:v=><Badge color={{receiving:"#3498db",processing:"#f39c12",fermenting:"#8e44ad",ready:"#27ae60",completed:"#95a5a6"}[v]||"#999"}>{{receiving:"收货中",processing:"加工中",fermenting:"发酵中",ready:"待装车",completed:"已完成"}[v]||v}</Badge>},
        {title:"进度",key:"steps",render:steps=>{if(!steps)return"—";const t=Object.keys(steps).length;const d=Object.values(steps).filter(s=>s.done).length;return <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:80,height:6,borderRadius:3,background:"#e9ecef"}}><div style={{width:`${(d/t)*100}%`,height:"100%",borderRadius:3,background:"#27ae60"}} /></div><span style={{fontSize:11,color:"#888"}}>{d}/{t}</span></div>;}},
        {title:"操作",key:"id",align:"center",render:(_,row)=>canEdit?<Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();openEdit(row);}}>管理</Btn>:null},
      ]} data={data.batches} /></Card>
      {showForm&&editItem&&(
        <Modal title={`批次 ${editItem.batchNo}`} onClose={()=>setShowForm(false)} width={680}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
            <Input label="批次号" value={editItem.batchNo} disabled />
            <Input label="日期" type="date" value={editItem.startDate} onChange={v=>setEditItem({...editItem,startDate:v})} />
            <Input label="原料重量(KG)" type="number" value={editItem.rawWeight} onChange={v=>setEditItem({...editItem,rawWeight:v})} suffix="KG" />
            <Input label="成品重量(KG)" type="number" value={editItem.processedWeight} onChange={v=>setEditItem({...editItem,processedWeight:v})} suffix="KG" />
          </div>
          {editItem.rawWeight&&editItem.processedWeight&&<div style={{background:"#f8f9fa",borderRadius:8,padding:12,marginBottom:14,fontSize:12}}>损耗：<strong style={{color:"#e74c3c"}}>{fmtKG(parseFloat(editItem.rawWeight)-parseFloat(editItem.processedWeight))}</strong>　正常范围：450-700 KG　加工费：<strong>{fmtVND(parseFloat(editItem.processedWeight)*1600)}</strong></div>}
          <Input label="状态" value={editItem.status} onChange={v=>setEditItem({...editItem,status:v})} options={[{value:"receiving",label:"收货中"},{value:"processing",label:"加工中"},{value:"fermenting",label:"发酵中"},{value:"ready",label:"待装车"},{value:"completed",label:"已完成"}]} />
          <div style={{fontSize:14,fontWeight:700,color:"#1B4332",marginBottom:12,marginTop:8}}>加工流程节点</div>
          {Object.entries(stepLabels).map(([key,label])=>(
            <div key={key} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:8,background:editItem.steps?.[key]?.done?"#e8f5e9":"#f8f9fa",border:`1px solid ${editItem.steps?.[key]?.done?"#a5d6a7":"#e0e0e0"}`,marginBottom:6}}>
              <input type="checkbox" checked={editItem.steps?.[key]?.done||false} onChange={e=>setEditItem({...editItem,steps:{...editItem.steps,[key]:{...editItem.steps[key],done:e.target.checked,time:e.target.checked?new Date().toLocaleString("zh-CN"):""}}})} style={{width:18,height:18,accentColor:"#1B4332"}} />
              <span style={{flex:1,fontWeight:600,fontSize:13}}>{label}</span>
              {editItem.steps?.[key]?.time&&<span style={{fontSize:11,color:"#888"}}>{editItem.steps[key].time}</span>}
            </div>
          ))}
          <Input label="备注" type="textarea" value={editItem.notes} onChange={v=>setEditItem({...editItem,notes:v})} style={{marginTop:12}} />
          <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16}}><Btn variant="secondary" onClick={()=>setShowForm(false)}>取消</Btn><Btn onClick={saveFn}>保存</Btn></div>
        </Modal>
      )}
    </div>
  );
};

// Finance Module - Full featured with payment CRUD

const FinanceModule = ({ data, setData, role }) => {

  const [showForm,setShowForm]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [filterType,setFilterType]=useState("all");
  const [filterMonth,setFilterMonth]=useState("");
  const canEdit=ROLES[role]?.level>=2;

  // ── payment records stored in data.payments ──
  const payments=data.payments||[];

  const emptyPayment={id:"",date:today(),type:"income",category:"",counterparty:"",amount:"",method:"cash",refNo:"",relatedId:"",notes:"",createdBy:""};

  const incomeCategories=[
    {value:"client_prepay",label:"客户预付款（代加工定金）"},

  ];

    {value:"vendor_purchase",label:"果款付款 Tiền hàng"},
    {value:"orchard_deposit",label:"果园意向金 Tiền cọc vườn"},
    {value:"orchard_balance",label:"果园尾款 Tiền vườn còn lại"},

    {value:"salary_office",label:"办公工资 Lương VP"},
    {value:"salary_worker",label:"工人工资 Lương thợ"},
    {value:"temp_labor",label:"临时工 Lương thời vụ"},
    {value:"packaging_box",label:"纸箱 Thùng carton"},
    {value:"packaging_label",label:"标签/果柄 Tem nhãn"},
    {value:"chemicals",label:"消毒药剂 Thuốc xử lý"},
    {value:"transport",label:"运费/车费 Cước xe"},
    {value:"customs",label:"通关费 Thông quan"},
    {value:"rent",label:"厂房租金 Thuê kho"},
    {value:"electricity",label:"电费 Tiền điện"},
    {value:"water",label:"水费 Tiền nước"},
    {value:"meals",label:"伙食费 Ăn uống"},
    {value:"fuel",label:"汽油费 Xăng dầu"},
    {value:"equipment",label:"设备/物资 Vật tư"},
    {value:"nitrogen",label:"液氮冷冻 Cấp đông Nito"},
    {value:"commission",label:"介绍费/佣金 Hoa hồng"},
    {value:"inspection",label:"鉴定费 Giám định"},
    {value:"insurance",label:"保险 Bảo hiểm"},
    {value:"tax_fee",label:"税费/手续费 Thuế/Phí"},
    {value:"fire_safety",label:"消防 PCCC"},
    {value:"other_expense",label:"其他支出 Chi phí khác"},
  ];
  const methodOptions=[
    {value:"cash",label:"现金 Tiền mặt"},{value:"bank",label:"银行转账 Ngân hàng"},{value:"wechat",label:"微信 WeChat"},{value:"alipay",label:"支付宝 Alipay"},{value:"other",label:"其他 Khác"},
  ];
  const allCategories=[...incomeCategories,...expenseCategories];
  const getCatLabel=(v)=>allCategories.find(c=>c.value===v)?.label||v;

  const openNew=(type)=>{setEditItem({...emptyPayment,id:genId(),type:type||"income"});setShowForm(true);};
  const openEdit=(p)=>{setEditItem({...p});setShowForm(true);};

  const saveFn=()=>{
    const item={...editItem,amount:parseFloat(editItem.amount)||0};
    if(!item.createdBy) item.createdBy=currentUser?.id; item.lastEditBy=currentUser?.id;
    const list=[...payments];
    const idx=list.findIndex(p=>p.id===item.id);
    if(idx>=0)list[idx]=item;else list.push(item);
    const sorted=list.sort((a,b)=>b.date.localeCompare(a.date));
    setData({...data,payments:sorted});
    save("df_pay",sorted);
    setShowForm(false);
  };
  const removeFn=(id)=>{
    if(!confirm("确认删除该收付款记录？"))return;
    const list=payments.filter(p=>p.id!==id);
    setData({...data,payments:list});
    save("df_pay",list);
  };

  // ── Calculations ──
  const totalIncome=payments.filter(p=>p.type==="income").reduce((s,p)=>s+(p.amount||0),0);
  const totalExpense=payments.filter(p=>p.type==="expense").reduce((s,p)=>s+(p.amount||0),0);
  const balance=totalIncome-totalExpense;
  // Cash vs Bank breakdown
  const cashIn=payments.filter(p=>p.type==="income"&&p.method==="cash").reduce((s,p)=>s+(p.amount||0),0);
  const cashOut=payments.filter(p=>p.type==="expense"&&p.method==="cash").reduce((s,p)=>s+(p.amount||0),0);
  const bankIn=payments.filter(p=>p.type==="income"&&p.method==="bank").reduce((s,p)=>s+(p.amount||0),0);
  const bankOut=payments.filter(p=>p.type==="expense"&&p.method==="bank").reduce((s,p)=>s+(p.amount||0),0);

  // Auto-calculated from business data
  const autoRevProcessing=data.containers.reduce((s,c)=>s+((c.loadedWeight||0)*15000),0);
  const autoRevLoading=data.containers.filter(c=>c.status==="completed").length*3000000;
  const autoCostVendor=data.purchases.filter(p=>p.source==="vendor").reduce((s,p)=>s+(p.totalCost||0),0);
  const autoCostOrchard=data.orchards.reduce((s,o)=>s+((o.actualTotalKG||o.estTotalKG||0)*6500),0);
  const autoCostProcess=data.batches.reduce((s,b)=>s+((b.processedWeight||b.rawWeight||0)*1600),0);
  const autoCostSalary=data.staff.filter(s=>s.active).reduce((s,st)=>s+(st.salary||0),0);

  // Registered income/expense by category
  const byCat=(type)=>{
    const cats=type==="income"?incomeCategories:expenseCategories;
    return cats.map(c=>{
      const total=payments.filter(p=>p.type===type&&p.category===c.value).reduce((s,p)=>s+(p.amount||0),0);
      return {label:c.label,value:c.value,total};
    }).filter(c=>c.total>0);
  };

  // Filter payments for ledger view
  const filtered=payments.filter(p=>{
    if(filterType!=="all"&&p.type!==filterType)return false;
    if(filterMonth&&!p.date.startsWith(filterMonth))return false;
    return true;
  });

  // Running balance
  const withBalance=(()=>{
    let bal=0;
    const sorted=[...filtered].sort((a,b)=>a.date.localeCompare(b.date));
    return sorted.map(p=>{
      bal+=p.type==="income"?(p.amount||0):-(p.amount||0);
      return {...p,runBalance:bal};
    }).reverse();
  })();

  // Months for filter
  const months=[...new Set(payments.map(p=>p.date.slice(0,7)))].sort().reverse();

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:800,color:"#1B4332"}}>💰 财务管理 Quản lý tài chính</h2>
        {canEdit&&<div style={{display:"flex",gap:8}}>
          <Btn onClick={()=>openNew("income")} variant="success">+ 登记收款</Btn>
          <Btn onClick={()=>openNew("expense")} variant="danger">+ 登记付款</Btn>
        </div>}
      </div>

      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <StatCard label="总收入 Thu" value={fmtVND(totalIncome)} color="#27ae60" sub={`${payments.filter(p=>p.type==="income").length} 笔`} />
        <StatCard label="总支出 Chi" value={fmtVND(totalExpense)} color="#e74c3c" sub={`${payments.filter(p=>p.type==="expense").length} 笔`} />
        <StatCard label="账面余额 Số dư" value={fmtVND(balance)} color={balance>=0?"#1B4332":"#e74c3c"} />
        <StatCard label="现金余额 Tiền mặt" value={fmtVND(cashIn-cashOut)} color="#e67e22" sub={`收${fmtVND(cashIn)} 支${fmtVND(cashOut)}`} />
        <StatCard label="银行余额 Ngân hàng" value={fmtVND(bankIn-bankOut)} color="#2980b9" sub={`收${fmtVND(bankIn)} 支${fmtVND(bankOut)}`} />
      </div>

      <Tabs tabs={[
        {key:"overview",label:"收支概览 Tổng quan"},
        {key:"ledger",label:"全部台账 Sổ cái"},
        {key:"cash",label:"现金账 Tiền mặt"},
        {key:"bank",label:"银行账 Ngân hàng"},
        {key:"income_detail",label:"收入明细 Thu"},
        {key:"expense_detail",label:"支出明细 Chi"},
        {key:"settle",label:"果园结算 TT vườn"},
        {key:"auto_calc",label:"业务核算 Đối chiếu"},
      ]} active={tab} onChange={setTab} />

      {/* ── Overview ── */}
      {tab==="overview"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <Card title="收入分类汇总">
          {byCat("income").length>0?byCat("income").map(c=>(
            <div key={c.value} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #f0f0f0",fontSize:13}}>
              <span>{c.label}</span><strong style={{color:"#27ae60"}}>{fmtVND(c.total)}</strong>
            </div>
          )):<div style={{color:"#aaa",textAlign:"center",padding:20}}>暂无收入登记，请点击"登记收款"</div>}
          {byCat("income").length>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",fontWeight:800,fontSize:15,borderTop:"2px solid #333",marginTop:4}}>
            <span>收入合计</span><span style={{color:"#27ae60"}}>{fmtVND(totalIncome)}</span>
          </div>}
        </Card>
        <Card title="支出分类汇总">
          {byCat("expense").length>0?byCat("expense").map(c=>(
            <div key={c.value} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #f0f0f0",fontSize:13}}>
              <span>{c.label}</span><strong style={{color:"#e74c3c"}}>{fmtVND(c.total)}</strong>
            </div>
          )):<div style={{color:"#aaa",textAlign:"center",padding:20}}>暂无支出登记，请点击"登记付款"</div>}
          {byCat("expense").length>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",fontWeight:800,fontSize:15,borderTop:"2px solid #333",marginTop:4}}>
            <span>支出合计</span><span style={{color:"#e74c3c"}}>{fmtVND(totalExpense)}</span>
          </div>}
        </Card>
      </div>}

      {/* ── Ledger (台账) ── */}
      {tab==="ledger"&&<Card>
        <div style={{display:"flex",gap:12,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
          <Input label="" value={filterType} onChange={setFilterType} options={[{value:"all",label:"全部"},{value:"income",label:"仅收入"},{value:"expense",label:"仅支出"}]} style={{marginBottom:0,minWidth:120}} />
          <Input label="" value={filterMonth} onChange={setFilterMonth} options={[{value:"",label:"全部月份"},...months.map(m=>({value:m,label:m}))] } style={{marginBottom:0,minWidth:140}} />
          <span style={{fontSize:12,color:"#888"}}>共 {withBalance.length} 条记录</span>
        </div>
        <Table columns={[
          {title:"日期",key:"date",nowrap:true},
          {title:"类型",key:"type",render:v=><Badge color={v==="income"?"#27ae60":"#e74c3c"}>{v==="income"?"收入":"支出"}</Badge>},
          {title:"分类",key:"category",render:v=>getCatLabel(v)},
          {title:"对方",key:"counterparty",render:v=><strong>{v||"—"}</strong>},
          {title:"金额",key:"amount",align:"right",render:(v,row)=><strong style={{color:row.type==="income"?"#27ae60":"#e74c3c"}}>{row.type==="income"?"+":"-"}{fmtVND(v)}</strong>},
          {title:"方式",key:"method",render:v=>({cash:"现金",bank:"银行",wechat:"微信",alipay:"支付宝"}[v]||v)},
          {title:"单据号",key:"refNo",render:v=><span style={{fontFamily:"monospace",fontSize:11}}>{v||"—"}</span>},
          {title:"余额",key:"runBalance",align:"right",render:v=><span style={{fontWeight:600,color:v>=0?"#1B4332":"#e74c3c"}}>{fmtVND(v)}</span>},
          {title:"操作",key:"id",align:"center",render:(_,row)=>canEdit?<div style={{display:"flex",gap:4,justifyContent:"center"}}>
            <Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();openEdit(row);}}>编辑</Btn>
            <Btn size="sm" variant="danger" onClick={e=>{e.stopPropagation();removeFn(row.id);}}>删</Btn>
          </div>:null},
        ]} data={withBalance} emptyText="暂无收付款记录，请点击上方按钮登记" />
      </Card>}

      {/* ── Cash Ledger 现金账 ── */}
      {tab==="cash"&&<Card title="现金账 Sổ tiền mặt">
        {(()=>{let bal=0;const cashItems=payments.filter(p=>p.method==="cash").sort((a,b)=>a.date.localeCompare(b.date)).map(p=>{bal+=p.type==="income"?(p.amount||0):-(p.amount||0);return{...p,runBal:bal};}).reverse();
        return <Table columns={[
          {title:"日期 Ngày",key:"date",nowrap:true},
          {title:"内容 Nội dung",key:"counterparty",render:(v,r)=><span><Badge color={r.type==="income"?"#27ae60":"#e74c3c"}>{r.type==="income"?"收Thu":"支Chi"}</Badge> {getCatLabel(r.category)} — {v}</span>},

          {title:"支出 Chi",key:"amount",align:"right",render:(v,r)=>r.type==="expense"?<strong style={{color:"#e74c3c"}}>{fmtVND(v)}</strong>:""},
