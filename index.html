  // 每个客户的余额 = 客户付给工厂的钱 - 工厂帮客户花的钱 - 装车消费
  const clientBalances = allClientNames.map(name => {
    // 入账：该客户作为payer付给factory的收入
    const paid = payments.filter(p => p.type === "income" && p.payer === name).reduce((s, p) => s + (p.amount || 0), 0);
    // 出账：从该客户账户扣的支出(payer=该客户)
    const spent = payments.filter(p => p.type === "expense" && p.payer === name).reduce((s, p) => s + (p.amount || 0), 0);
    // 装车消费
    const contCost = containers.filter(c => c.clientName === name).reduce((s, c) => s + ((c.loadedWeight || 0) * getCfg(data, "processingRate") + getCfg(data, "loadingFee")), 0);
    const balance = paid - spent - contCost;

      name,
      paid,
      spent,
      contCost,
      balance

// Helper: compute payment status for any payable item
const computePayStatus = (payableAmount, linkedPayments) => {
  const totalPaid = (linkedPayments || []).reduce((s, p) => s + (p.amount || 0), 0);
  if (totalPaid <= 0) return {
    status: "unpaid",
    label: "未付 Chưa TT",
    color: "#e74c3c",
    paid: 0,
    remaining: payableAmount
  };
  if (totalPaid >= payableAmount * 0.995) return {
    status: "paid",
    label: "已清 Đã TT",
    color: "#27ae60",
    paid: totalPaid,
    remaining: 0
  };
  return {
    status: "partial",
    label: "部分付 TT một phần",
    color: "#f39c12",
    paid: totalPaid,
    remaining: payableAmount - totalPaid
  };
};

// Helper: find all payments linked to a specific source record
const findLinkedPayments = (payments, sourceModule, sourceId, counterparty) => {
  return (payments || []).filter(p => {
    // Direct link via linkedSourceId
    if (p.linkedSourceId === sourceId && p.linkedModule === sourceModule) return true;
    // Legacy: match by counterparty + category for backwards compatibility
    if (!p.linkedSourceId && p.type === "expense" && counterparty) {
      if (sourceModule === "purchase" && p.counterparty === counterparty && (p.category === "vendor_purchase" || p.category === "orchard_balance")) return false; // Only use legacy matching when no linkedSourceId exists on ANY payment for this source
    }
    return false;
  });
};
